<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierliste</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
    }

    th, td {
      border: 1px solid #444;
      padding: 12px;
      vertical-align: top;
    }

    th {
      background-color: #222;
    }

    canvas {
      background: white;
      padding: 5px;
      border-radius: 8px;
    }

    .beers {
      font-size: 20px;
    }

    .price {
      font-size: 14px;
      color: #aaa;
    }

    button {
      padding: 8px 16px;
      background-color: #0a84ff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    #message {
      margin: 20px;
      font-size: 20px;
      color: #0f0;
    }

    #chartContainer {
      width: 80%;
      margin: 40px auto;
    }

    @keyframes beerPop {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .beer-animated {
      display: inline-block;
      animation: beerPop 0.4s ease;
    }

    #adminPanel {
      margin-top: 40px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🍺 JUII Bierliste 🍺</h1>

<div id="message"></div>

<table>
  <tr>
    <th>Name</th>
    <th>Biere</th>
    <th>Aktion</th>
    <th>QR</th>
  </tr>

  <tr>
    <td>Bernd</td>
    <td id="Bernd"></td>
    <td><button onclick="add('Bernd')">+1</button></td>
    <td><canvas id="qr-Bernd"></canvas></td>
  </tr>

  <tr>
    <td>Basti</td>
    <td id="Basti"></td>
    <td><button onclick="add('Basti')">+1</button></td>
    <td><canvas id="qr-Basti"></canvas></td>
  </tr>

  <tr>
    <td>Dietmar</td>
    <td id="Dietmar"></td>
    <td><button onclick="add('Dietmar')">+1</button></td>
    <td><canvas id="qr-Dietmar"></canvas></td>
  </tr>
</table>

<!-- 📊 Diagramm -->
<div id="chartContainer">
  <h2>Monatliche Bierübersicht</h2>
  <canvas id="beerChart"></canvas>
</div>

<h2>Verlauf</h2>
<ul id="history"></ul>

<!-- 🔐 Admin -->
<div id="adminPanel">
  <h2>Admin</h2>
  <input type="password" id="password" placeholder="Passwort">
  <button onclick="login()">Login</button>

  <div id="adminActions" style="display:none; margin-top:10px;">
    <button onclick="resetAll()" style="background:red;">Alles löschen</button>
    <button onclick="clearHistory()" style="background:orange;">Verlauf löschen</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const ref = doc(db, "strichliste", "main");

  const names = ["Bernd", "Basti", "Dietmar"];
  const price = 2;

  let lastCounts = { Bernd: 0, Basti: 0, Dietmar: 0 };
  let chart;

  function renderBeers(count, name) {
    let html = "";

    for (let i = 0; i < count; i++) {
      if (i >= lastCounts[name]) {
        html += `<span class="beer-animated">🍺</span>`;
      } else {
        html += "🍺";
      }
    }

    return html;
  }

  function createChart(history) {
    const monthly = {};

    history.forEach(e => {
      const d = new Date(e.time);
      const key = `${d.getMonth()+1}/${d.getFullYear()}`;
      monthly[key] = (monthly[key] || 0) + 1;
    });

    const labels = Object.keys(monthly);
    const data = Object.values(monthly);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("beerChart"), {
      type: "bar",
      data: {
        labels,
        datasets: [{ label: "Biere", data }]
      }
    });
  }

  function listen() {
    onSnapshot(ref, snap => {
      let data = snap.exists() ? snap.data() : {
        Bernd:0,Basti:0,Dietmar:0,history:[]
      };

      names.forEach(name => {
        const c = data[name] || 0;

        document.getElementById(name).innerHTML = `
          <div class="beers">${renderBeers(c, name)}</div>
          <div class="price">(${c*price} €)</div>
        `;

        lastCounts[name] = c;
      });

      renderHistory(data.history || []);
      createChart(data.history || []);
    });
  }

  function renderHistory(h) {
    const ul = document.getElementById("history");
    ul.innerHTML = "";

    h.slice().reverse().forEach(e => {
      const li = document.createElement("li");
      li.innerText = `${e.name} → ${e.time}`;
      ul.appendChild(li);
    });
  }

  window.add = async function(name) {
    const snap = await getDoc(ref);
    let data = snap.exists() ? snap.data() : {
      Bernd:0,Basti:0,Dietmar:0,history:[]
    };

    data[name]++;
    data.history.push({
      name,
      time: new Date().toISOString()
    });

    await setDoc(ref, data);
  };

  listen();

  // QR Codes
  const base = window.location.origin + window.location.pathname;

  names.forEach(n => {
    QRCode.toCanvas(
      document.getElementById("qr-"+n),
      base+"?add="+n,
      { width:100 }
    );
  });

  // Scan Action
  const p = new URLSearchParams(window.location.search);
  const u = p.get("add");

  if (u && names.includes(u)) {
    add(u);

    document.getElementById("message").innerText =
      `🍺 1 Bier wurde für ${u} hinzugefügt`;

    if (navigator.vibrate) navigator.vibrate([100,50,100]);

    window.history.replaceState({}, "", window.location.pathname);

    setTimeout(() => {
      window.location.href = window.location.pathname;
    }, 3000);
  }

  // Admin
  window.login = function() {
    if (document.getElementById("password").value === "admin") {
      document.getElementById("adminActions").style.display = "block";
    } else alert("Falsch");
  };

  window.resetAll = async function() {
    await setDoc(ref, {
      Bernd:0,Basti:0,Dietmar:0,history:[]
    });
  };

  window.clearHistory = async function() {
    const snap = await getDoc(ref);
    let d = snap.data();
    d.history = [];
    await setDoc(ref, d);
  };
</script>

</body>
</html>
