<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strichliste</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
    }

    th, td {
      border: 1px solid #444;
      padding: 12px;
    }

    th {
      background-color: #222;
    }

    canvas {
      background: white;
      padding: 5px;
      border-radius: 8px;
    }

    .price {
      font-size: 14px;
      color: #aaa;
    }

    button {
      padding: 8px 16px;
      background-color: #0a84ff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    #message {
      margin: 20px;
      font-size: 20px;
      color: #0f0;
    }
  </style>
</head>

<body>

<h1>Strichliste</h1>

<div id="message"></div>

<table>
  <tr>
    <th>Name</th>
    <th>Striche</th>
    <th>Aktion</th>
    <th>QR-Code</th>
  </tr>

  <tr>
    <td>Bernd</td>
    <td id="Bernd"></td>
    <td><button onclick="add('Bernd')">+1</button></td>
    <td><canvas id="qr-Bernd"></canvas></td>
  </tr>

  <tr>
    <td>Basti</td>
    <td id="Basti"></td>
    <td><button onclick="add('Basti')">+1</button></td>
    <td><canvas id="qr-Basti"></canvas></td>
  </tr>

  <tr>
    <td>Dietmar</td>
    <td id="Dietmar"></td>
    <td><button onclick="add('Dietmar')">+1</button></td>
    <td><canvas id="qr-Dietmar"></canvas></td>
  </tr>
</table>

<h2>Verlauf</h2>
<ul id="history"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    // 🔴 deine Firebase Daten
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ref = doc(db, "strichliste", "main");

  const names = ["Bernd", "Basti", "Dietmar"];
  const pricePerBeer = 2;

  async function load() {
    const snap = await getDoc(ref);

    let data = {
      Bernd: 0,
      Basti: 0,
      Dietmar: 0,
      history: []
    };

    if (snap.exists()) {
      data = snap.data();
    }

    names.forEach(name => {
      const count = data[name] || 0;
      const price = count * pricePerBeer;

      document.getElementById(name).innerHTML = `
        ${count}<br>
        <span class="price">(${price} €)</span>
      `;
    });

    renderHistory(data.history || []);
  }

  function renderHistory(history) {
    const ul = document.getElementById("history");
    ul.innerHTML = "";

    history.slice().reverse().forEach(entry => {
      const li = document.createElement("li");
      li.innerText = `${entry.name} → ${entry.time}`;
      ul.appendChild(li);
    });
  }

  window.add = async function(name) {
    const snap = await getDoc(ref);

    let data = {
      Bernd: 0,
      Basti: 0,
      Dietmar: 0,
      history: []
    };

    if (snap.exists()) {
      data = snap.data();
    }

    data[name] = (data[name] || 0) + 1;

    data.history.push({
      name: name,
      time: new Date().toLocaleString()
    });

    await setDoc(ref, data);

    load();
  };

  load();

  // QR-Codes
  const baseUrl = window.location.origin + window.location.pathname;

  names.forEach(name => {
    const url = baseUrl + "?add=" + name;

    QRCode.toCanvas(
      document.getElementById("qr-" + name),
      url,
      { width: 100 }
    );
  });

  // Auto-Add + Anzeige + Reset
  const params = new URLSearchParams(window.location.search);
  const user = params.get("add");

  if (user && names.includes(user)) {
    add(user);

    const msg = document.getElementById("message");
    msg.innerText = `🍺 1 Bier wurde für ${user} hinzugefügt`;

    window.history.replaceState({}, document.title, window.location.pathname);

    setTimeout(() => {
      window.location.href = window.location.pathname;
    }, 3000);
  }
</script>

</body>
</html>
