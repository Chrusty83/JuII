<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierdeckel</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 80%;
    }

    th, td {
      border: 1px solid #444;
      padding: 12px;
      vertical-align: top;
    }

    th {
      background-color: #222;
    }

    canvas {
      background: #1b1b1b;
      padding: 5px;
      border-radius: 8px;
    }

    .beers {
      font-size: 20px;
    }

    .price {
      font-size: 14px;
      color: #aaa;
    }

    button {
      padding: 8px 16px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    .add { background: #0a84ff; }
    .pay { background: #00c853; }

    #message {
      margin: 20px;
      font-size: 20px;
      color: #0f0;
    }

    #chartContainer {
      width: 80%;
      margin: 40px auto;
    }

    #adminPanel {
      margin-top: 40px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    /* Modal */
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>

<body>

<h1>🍺 JUII Bierdeckel 🍺</h1>

<div id="message"></div>

<table>
  <tr>
    <th>Name</th>
    <th>Biere</th>
    <th>Aktion</th>
    <th>QR</th>
  </tr>

  <tr>
    <td>Bernd</td>
    <td id="Bernd"></td>
    <td>
      <button class="add" onclick="add('Bernd')">+1</button>
      <button class="pay" onclick="pay('Bernd')">Zahlen</button>
    </td>
    <td><canvas id="qr-Bernd"></canvas></td>
  </tr>

  <tr>
    <td>Basti</td>
    <td id="Basti"></td>
    <td>
      <button class="add" onclick="add('Basti')">+1</button>
      <button class="pay" onclick="pay('Basti')">Zahlen</button>
    </td>
    <td><canvas id="qr-Basti"></canvas></td>
  </tr>

  <tr>
    <td>Dietmar</td>
    <td id="Dietmar"></td>
    <td>
      <button class="add" onclick="add('Dietmar')">+1</button>
      <button class="pay" onclick="pay('Dietmar')">Zahlen</button>
    </td>
    <td><canvas id="qr-Dietmar"></canvas></td>
  </tr>
</table>

<!-- 📊 Chart -->
<div id="chartContainer">
  <h2>Monatsübersicht</h2>
  <canvas id="beerChart"></canvas>
</div>

<!-- 🔐 Admin -->
<div id="adminPanel">
  <h2>Admin</h2>
  <input type="password" id="password">
  <button onclick="login()" class="add">Login</button>

  <div id="adminActions" style="display:none; margin-top:10px;">
    <button onclick="resetAll()" style="background:red;">Alles löschen</button>
    <button onclick="clearHistory()" style="background:orange;">Verlauf löschen</button>

    <!-- Verlauf nur hier -->
    <h3>Verlauf</h3>
    <ul id="history"></ul>
  </div>
</div>

<!-- 💰 Popup -->
<div id="popup">
  <div id="popupBox">
    <h2 id="popupName"></h2>
    <p id="popupSum"></p>
    <button onclick="closePopup()" class="add">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

const names = ["Bernd","Basti","Dietmar"];
const price = 2;

let dataCache = {};
let chart;

function renderBeers(c){
  return "🍺".repeat(c);
}

function listen(){
  onSnapshot(ref, snap => {
    let data = snap.exists()?snap.data():{Bernd:0,Basti:0,Dietmar:0,history:[]};
    dataCache = data;

    names.forEach(n=>{
      const c = data[n]||0;
      document.getElementById(n).innerHTML =
        `<div class="beers">${renderBeers(c)}</div>
         <div class="price">${c*price} €</div>`;
    });

    renderHistory(data.history||[]);
    renderChart(data.history||[]);
  });
}

function renderHistory(h){
  const ul = document.getElementById("history");
  if(!ul) return;
  ul.innerHTML="";
  h.slice().reverse().forEach(e=>{
    let li=document.createElement("li");
    li.innerText=`${e.name} → ${e.time}`;
    ul.appendChild(li);
  });
}

function renderChart(h){
  const m={};
  h.forEach(e=>{
    let d=new Date(e.time);
    let k=`${d.getMonth()+1}/${d.getFullYear()}`;
    m[k]=(m[k]||0)+1;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("beerChart"),{
    type:"bar",
    data:{
      labels:Object.keys(m),
      datasets:[{label:"Biere",data:Object.values(m)}]
    },
    options:{
      plugins:{legend:{labels:{color:"#fff"}}},
      scales:{
        x:{ticks:{color:"#fff"}},
        y:{ticks:{color:"#fff"}}
      }
    }
  });
}

window.add = async function(name){
  const snap=await getDoc(ref);
  let d=snap.exists()?snap.data():{Bernd:0,Basti:0,Dietmar:0,history:[]};

  d[name]++;
  d.history.push({name,time:new Date().toISOString()});

  await setDoc(ref,d);
};

window.pay = function(name){
  const c=dataCache[name]||0;
  const sum=c*price;

  document.getElementById("popupName").innerText=name;
  document.getElementById("popupSum").innerText=`Zu zahlen: ${sum} €`;

  document.getElementById("popup").style.display="flex";
};

window.closePopup = async function(){
  const snap=await getDoc(ref);
  let d=snap.data();

  names.forEach(n=>d[n]=0);
  d.history=[];

  await setDoc(ref,d);

  document.getElementById("popup").style.display="none";
};

window.login=function(){
  if(document.getElementById("password").value==="admin"){
    document.getElementById("adminActions").style.display="block";
  }
};

window.resetAll=async function(){
  await setDoc(ref,{Bernd:0,Basti:0,Dietmar:0,history:[]});
};

window.clearHistory=async function(){
  let d=dataCache;
  d.history=[];
  await setDoc(ref,d);
};

listen();

// QR
const base=window.location.origin+window.location.pathname;

names.forEach(n=>{
  QRCode.toCanvas(document.getElementById("qr-"+n), base+"?add="+n,{width:100});
});

// Scan
const p=new URLSearchParams(window.location.search);
const u=p.get("add");

if(u && names.includes(u)){
  add(u);

  document.getElementById("message").innerText=
    `🍺 1 Bier für ${u}`;

  if(navigator.vibrate) navigator.vibrate([100,50,100]);

  window.history.replaceState({}, "", window.location.pathname);

  setTimeout(()=>location.href=window.location.pathname,3000);
}
</script>

</body>
</html>
