<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierdeckel</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      font-size: 32px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background-color: #222;
    }

    canvas {
      background: #fff;
      border-radius: 8px;
    }

    .beers {
      font-size: 22px;
    }

    .price {
      font-size: 12px;
      color: #aaa;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin: 2px;
    }

    .add { background: #0a84ff; }
    .pay { background: #00c853; }

    #message {
      margin: 15px;
      font-size: 18px;
      color: #0f0;
    }

    #chartContainer {
      width: 95%;
      margin: 30px auto;
    }

    /* Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
  </style>
</head>

<body>

<h1>🍺 JUII Bierdeckel 🍺</h1>

<div id="message"></div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Biere</th>
      <th>Aktion</th>
      <th>QR</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="chartContainer">
  <h2>Monatsübersicht</h2>
  <canvas id="beerChart"></canvas>
</div>

<!-- 🔐 Admin -->
<h2>Admin</h2>
<input type="password" id="password">
<button onclick="login()" class="add">Login</button>

<div id="adminActions" style="display:none;">
  <button onclick="resetAll()" style="background:red;">Alles löschen</button>
  <button onclick="clearHistory()" style="background:orange;">Verlauf löschen</button>

  <h3>Verlauf</h3>
  <ul id="history"></ul>
</div>

<!-- 💰 Popup -->
<div id="popup">
  <div id="popupBox">
    <h2 id="popupName"></h2>
    <p id="popupSum"></p>
    <button onclick="closePopup()" class="add">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

const names = [
  "Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris",
  "Clemens","Dietmar","Donde","Jakob","Lukas","Max",
  "Micha","Hainzl","Philipp","Basti B.","Simon",
  "Schwob","Tim","Timo","Tom"
];

const price = 2;

let last = {};
let chart;
let payingPerson = null;

/* Safe ID */
function safeId(n){
  return n.replace(/[^a-zA-Z0-9]/g,"");
}

/* Chart */
function renderChart(h){
  const m = {};

  h.forEach(e=>{
    const d = new Date(e.time);
    const k = `${d.getMonth()+1}/${d.getFullYear()}`;
    m[k] = (m[k] || 0) + 1;
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("beerChart"), {
    type: "bar",
    data: {
      labels: Object.keys(m),
      datasets: [{ label: "Biere", data: Object.values(m) }]
    }
  });
}

/* Live Listener */
function listen(){
  onSnapshot(ref, snap => {
    const d = snap.exists() ? snap.data() : { history: [] };

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    names.forEach(n => {
      const c = d[n] || 0;
      const id = safeId(n);

      let beers = "";
      for(let i=0;i<c;i++){
        beers += "🍺";
      }

      tbody.innerHTML += `
        <tr>
          <td>${n}</td>
          <td>
            <div class="beers">${beers}</div>
            <div class="price">${c * price} €</div>
          </td>
          <td>
            <button class="add" onclick="add('${n}')">+1</button>
            <button class="pay" onclick="pay('${n}')">Zahlen</button>
          </td>
          <td><canvas id="qr-${id}"></canvas></td>
        </tr>
      `;

      last[n] = c;
    });

    renderHistory(d.history || []);
    renderChart(d.history || []);
  });
}

/* Add */
window.add = async function(name){
  const snap = await getDoc(ref);
  const d = snap.exists() ? snap.data() : { history: [] };

  d[name] = (d[name] || 0) + 1;

  d.history.push({
    name,
    time: new Date().toISOString()
  });

  await setDoc(ref, d);
};

/* PAY */
window.pay = function(name){
  const c = last[name] || 0;

  payingPerson = name;

  document.getElementById("popupName").innerText = name;
  document.getElementById("popupSum").innerText = `Zu zahlen: ${c * price} €`;

  document.getElementById("popup").style.display = "flex";
};

/* CLOSE POPUP -> nur 1 Person reset */
window.closePopup = async function(){
  const snap = await getDoc(ref);
  const d = snap.data();

  if(payingPerson){
    d[payingPerson] = 0;
  }

  await setDoc(ref, d);

  payingPerson = null;
  document.getElementById("popup").style.display = "none";
};

/* Admin */
window.login = function(){
  if(document.getElementById("password").value === "admin"){
    document.getElementById("adminActions").style.display = "block";
  }
};

window.resetAll = async function(){
  await setDoc(ref, { history: [] });
};

window.clearHistory = async function(){
  const snap = await getDoc(ref);
  const d = snap.data();
  d.history = [];
  await setDoc(ref, d);
};

/* History */
function renderHistory(h){
  const ul = document.getElementById("history");
  if(!ul) return;

  ul.innerHTML = "";

  h.slice().reverse().forEach(e=>{
    const li = document.createElement("li");
    li.innerText = `${e.name} → ${e.time}`;
    ul.appendChild(li);
  });
}

/* QR Codes */
const base = window.location.origin + window.location.pathname;

names.forEach(n=>{
  const id = safeId(n);

  setTimeout(()=>{
    QRCode.toCanvas(
      document.getElementById("qr-"+id),
      base + "?add=" + n,
      {
        width: 120,
        color: { dark:"#000", light:"#fff" }
      }
    );
  }, 150);
});

/* Scan */
const params = new URLSearchParams(window.location.search);
const u = params.get("add");

if(u && names.includes(u)){
  add(u);

  document.getElementById("message").innerText =
    `🍺 1 Bier für ${u}`;

  if(navigator.vibrate){
    navigator.vibrate([100,50,100]);
  }

  window.history.replaceState({}, "", window.location.pathname);

  setTimeout(()=>{
    location.href = window.location.pathname;
  }, 1500);
}

listen();
</script>

</body>
</html>
