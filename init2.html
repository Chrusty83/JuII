<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierdeckel</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    h1 { font-size: 32px; }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background-color: #222;
    }

    canvas {
      background: #1b1b1b;
      padding: 5px;
      border-radius: 8px;
    }

    .beers {
      font-size: 22px;
    }

    .price {
      font-size: 12px;
      color: #aaa;
    }

    button {
      padding: 10px 14px;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      margin: 2px;
    }

    .add { background: #0a84ff; }
    .pay { background: #00c853; }

    #message {
      margin: 15px;
      font-size: 18px;
      color: #0f0;
    }

    #chartContainer {
      width: 95%;
      margin: 30px auto;
    }

    /* 🍺 Animation */
    @keyframes beerPop {
      0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
      50% { transform: scale(1.3) rotate(5deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .beer-animated {
      display: inline-block;
      animation: beerPop 0.4s ease;
    }

    /* 📱 MOBILE PARTY MODE */
    @media (max-width: 768px) {

      h1 { font-size: 26px; }

      th, td {
        font-size: 12px;
        padding: 6px;
      }

      .beers {
        font-size: 28px;
      }

      button {
        padding: 14px;
        font-size: 14px;
      }

      canvas {
        width: 70px !important;
        height: 70px !important;
      }
    }

    /* 🔐 Admin */
    #adminPanel {
      margin-top: 40px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    /* 💰 Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: #222;
      padding: 20px;
      border-radius: 10px;
    }

    /* 📱 Party Banner */
    #partyBanner {
      display: none;
      background: #ff9800;
      padding: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="partyBanner">🎉 PARTY MODE AKTIV 🎉</div>

<h1>🍺 JUII Bierdeckel 🍺</h1>

<div id="message"></div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Biere</th>
      <th>Aktion</th>
      <th>QR</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="chartContainer">
  <h2>Monatsübersicht</h2>
  <canvas id="beerChart"></canvas>
</div>

<div id="adminPanel">
  <h2>Admin</h2>
  <input type="password" id="password">
  <button onclick="login()" class="add">Login</button>

  <div id="adminActions" style="display:none;">
    <button onclick="resetAll()" style="background:red;">Alles löschen</button>
    <button onclick="clearHistory()" style="background:orange;">Verlauf löschen</button>

    <h3>Verlauf</h3>
    <ul id="history"></ul>
  </div>
</div>

<!-- 💰 Popup -->
<div id="popup">
  <div id="popupBox">
    <h2 id="popupName"></h2>
    <p id="popupSum"></p>
    <button onclick="closePopup()" class="add">OK</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

const names = [
  "Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris",
  "Clemens","Dietmar","Donde","Jakob","Lukas","Max",
  "Micha","Hainzl","Philipp","Basti B.","Simon",
  "Schwob","Tim","Timo","Tom"
];

const price = 2;

let last = {};
let chart;

const isMobile = window.innerWidth <= 768;
if(isMobile){
  document.getElementById("partyBanner").style.display="block";
}

function safeId(n){
  return n.replace(/[^a-zA-Z0-9]/g,"");
}

/* 📊 Chart */
function renderChart(h){
  const m={};
  h.forEach(e=>{
    const d=new Date(e.time);
    const k=`${d.getMonth()+1}/${d.getFullYear()}`;
    m[k]=(m[k]||0)+1;
  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("beerChart"),{
    type:"bar",
    data:{
      labels:Object.keys(m),
      datasets:[{label:"Biere",data:Object.values(m)}]
    },
    options:{
      scales:{
        x:{ticks:{color:"#fff"}},
        y:{ticks:{color:"#fff"}}
      }
    }
  });
}

/* 🔄 Live */
function listen(){
  onSnapshot(ref,snap=>{
    const d=snap.exists()?snap.data():{history:[]};

    const tbody=document.getElementById("tableBody");
    tbody.innerHTML="";

    names.forEach(n=>{
      const c=d[n]||0;
      const pid=safeId(n);

      let html="";
      for(let i=0;i<c;i++){
        html+= (i> (last[n]||0)) ?
        `<span class="beer-animated">🍺</span>`:"🍺";
      }

      tbody.innerHTML+=`
        <tr>
          <td>${n}</td>
          <td><div class="beers">${html}</div><div class="price">${c*price}€</div></td>
          <td>
            <button class="add" onclick="add('${n}')">+1</button>
            <button class="pay" onclick="pay('${n}')">Zahlen</button>
          </td>
          <td><canvas id="qr-${pid}"></canvas></td>
        </tr>
      `;

      last[n]=c;
    });

    renderHistory(d.history||[]);
    renderChart(d.history||[]);
  });
}

/* ➕ Add */
window.add=async function(n){
  const s=await getDoc(ref);
  const d=s.exists()?s.data():{history:[]};

  d[n]=(d[n]||0)+1;
  d.history.push({name:n,time:new Date().toISOString()});

  await setDoc(ref,d);
};

/* 💰 Pay */
window.pay=function(n){
  const c=last[n]||0;
  document.getElementById("popupName").innerText=n;
  document.getElementById("popupSum").innerText=`Zu zahlen: ${c*price} €`;
  document.getElementById("popup").style.display="flex";
};

window.closePopup=async function(){
  const s=await getDoc(ref);
  const d=s.data();

  names.forEach(n=>d[n]=0);
  d.history=[];

  await setDoc(ref,d);
  document.getElementById("popup").style.display="none";
};

/* 🔐 Admin */
window.login=function(){
  if(document.getElementById("password").value==="admin"){
    document.getElementById("adminActions").style.display="block";
  }
};

window.resetAll=async function(){
  await setDoc(ref,{history:[]});
};

window.clearHistory=async function(){
  const s=await getDoc(ref);
  const d=s.data();
  d.history=[];
  await setDoc(ref,d);
};

/* 📜 History */
function renderHistory(h){
  const ul=document.getElementById("history");
  if(!ul) return;
  ul.innerHTML="";
  h.slice().reverse().forEach(e=>{
    let li=document.createElement("li");
    li.innerText=`${e.name} → ${e.time}`;
    ul.appendChild(li);
  });
}

/* 📱 QR */
const base=window.location.origin+window.location.pathname;

names.forEach(n=>{
  const id=safeId(n);
  setTimeout(()=>{
    QRCode.toCanvas(
      document.getElementById("qr-"+id),
      base+"?add="+n,
      {width:80}
    );
  },100);
});

/* 📳 Scan */
const p=new URLSearchParams(window.location.search);
const u=p.get("add");

if(u && names.includes(u)){
  add(u);

  document.getElementById("message").innerText=
    `🍺 1 Bier für ${u}`;

  if(navigator.vibrate) navigator.vibrate([100,50,100]);

  window.history.replaceState({}, "", window.location.pathname);

  setTimeout(()=>location.href=window.location.pathname,2000);
}

listen();
</script>

</body>
</html>
