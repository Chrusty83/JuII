<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JUII Bierdeckel – Strichliste</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px 12px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f9b43a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    h2, h3 { margin: 1rem 0 0.75rem; color: #ffd966; }
    .glass-card {
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 20px 0;
      border: 1px solid #2c2c3a;
    }
    table {
      margin: 16px auto;
      border-collapse: collapse;
      width: 100%;
      max-width: 1300px;
      background: #1e1e2a;
      border-radius: 24px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #2e2e3e;
      padding: 12px 8px;
      font-size: 14px;
      vertical-align: middle;
    }
    th { background: #252536; color: #ffda88; }
    .beer-icons { font-size: 1.4rem; letter-spacing: 2px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      margin: 4px 6px;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.96); }
    .add { background: #0a84ff; color: white; }
    .pay { background: #00c853; color: white; }
    .cancel { background: #6c757d; color: white; }
    .admin-login-btn { background: #5a5fcf; color: white; }
    .qr-grid canvas {
      background: white;
      border-radius: 12px;
      padding: 6px;
      width: 100px !important;
      height: 100px !important;
    }
    #chartContainer {
      background: #1a1a28;
      border-radius: 28px;
      padding: 16px;
      margin: 28px 0;
    }
    canvas#beerChart { max-height: 320px; width: 100% !important; }
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #252536;
      border-radius: 20px;
      padding: 15px 25px;
      min-width: 140px;
      text-align: center;
      border: 1px solid #3a3a4a;
    }
    .stat-month {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffd966;
      margin-bottom: 8px;
    }
    .stat-count {
      font-size: 2.2rem;
      font-weight: bold;
      color: #f9b43a;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 5px;
    }
    input[type="password"] {
      background: #2a2a36;
      border: 1px solid #444;
      padding: 10px 14px;
      border-radius: 48px;
      color: white;
      font-size: 1rem;
      width: 220px;
    }
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #popupBox {
      background: #1f1f2c;
      padding: 28px 24px;
      border-radius: 48px;
      min-width: 260px;
      border: 1px solid #ffd966;
    }
    #popupSum { font-size: 1.8rem; font-weight: bold; color: #b9f6ca; }
    .history-list {
      background: #0f0f17;
      border-radius: 28px;
      padding: 12px 18px;
      max-height: 240px;
      overflow-y: auto;
      text-align: left;
    }
    footer {
      font-size: 11px;
      margin-top: 30px;
      opacity: 0.5;
      color: #888;
    }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #ffd966;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>🍺 JUII BIERDECKEL 🍺</h1>

<div class="glass-card">
  <h2>📋 Offene Biere</h2>
  <div style="overflow-x: auto;">
    <table>
      <thead><tr><th>Name</th><th>🍺 Anzahl / Betrag</th><th>Aktionen</th></tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="3" style="text-align:center;">📡 Lade Daten... <span class="loading-spinner"></span></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
  
  <!-- Monatsübersicht -->
  <div id="monthStats" class="stats-container">
    <div class="stat-card">
      <div class="stat-month" id="currentMonthLabel">-</div>
      <div class="stat-count" id="currentMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="lastMonthLabel">-</div>
      <div class="stat-count" id="lastMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="twoMonthsAgoLabel">-</div>
      <div class="stat-count" id="twoMonthsAgoCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
  </div>
</div>

<div class="glass-card qr-grid">
  <h2>📱 QR-Codes</h2>
  <div style="overflow-x: auto;">
    <table>
      <tbody id="qrBody"></tbody>
    </table>
  </div>
</div>

<div class="glass-card">
  <h2>🔐 Admin Bereich</h2>
  <div>
    <input type="password" id="adminPassword" placeholder="Passwort eingeben" autocomplete="off">
    <button id="loginBtn" class="admin-login-btn">🔓 Login</button>
  </div>
  <div id="adminActions" style="display:none; margin-top: 20px;">
    <button id="resetAllBtn" style="background:#c44536;">🧹 Alle Biere zurücksetzen</button>
    <button id="clearHistoryBtn" style="background:#e68a2e;">🗑️ Verlauf löschen</button>
    <button id="logoutBtn" style="background:#666;">🚪 Logout</button>
    <h3>📜 Letzte Aktionen</h3>
    <div class="history-list"><ul id="history"></ul></div>
  </div>
</div>

<div id="popup">
  <div id="popupBox">
    <h3 id="popupName"></h3>
    <p>offene Rechnung:</p>
    <p id="popupSum"></p>
    <button class="pay" id="confirmPayBtn">✅ Zahlen & löschen</button>
    <button class="cancel" id="closePopupBtn">❌ Abbrechen</button>
  </div>
</div>

<footer>
  <span id="connectionStatus"></span>
</footer>

<script>
  // ==================== FIREBASE KONFIGURATION ====================
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
  };
  
  // ==================== ADMIN PASSWORT ====================
  const ADMIN_PASSWORD = "admin123";
  
  let isAdminLoggedIn = false;
  let useFirebase = false;
  let mainDocRef = null;
  let unsubscribe = null;
  let beerChart = null;
  let currentPayPerson = null;
  
  const names = ["Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris","Clemens","Dietmar","Donde","Jakob","Lukas","Max","Micha","Hainzl","Philipp","Basti B.","Simon","Schwob","Tim","Timo","Tom"];
  const BEER_PRICE = 2.00;
  const STORAGE_KEY = "juii_bierdeckel_data";
  
  // ==================== HILFSFUNKTIONEN ====================
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  function formatEuro(amount) {
    if (amount === Math.floor(amount)) {
      return `${Math.floor(amount)} €`;
    } else {
      return `${amount.toFixed(2)} €`;
    }
  }
  
  function updateConnectionStatus(status) {
    const statusDiv = document.getElementById('connectionStatus');
    if (statusDiv) {
      statusDiv.innerHTML = status;
    }
  }
  
  // ==================== MONATSÜBERSICHT ====================
  function getMonthName(year, month) {
    const date = new Date(year, month - 1, 1);
    return date.toLocaleString('de-DE', { month: 'long', year: 'numeric' });
  }
  
  function updateMonthStats(historyArray) {
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    
    // Zielmonate: aktueller Monat, letzter Monat, vorletzter Monat
    const targets = [
      { year: currentYear, month: currentMonth, label: "Aktueller Monat", elementId: "currentMonthCount", labelId: "currentMonthLabel" },
      { year: currentMonth === 1 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 12 : currentMonth - 1, elementId: "lastMonthCount", labelId: "lastMonthLabel" },
      { year: currentMonth <= 2 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 11 : (currentMonth === 2 ? 12 : currentMonth - 2), elementId: "twoMonthsAgoCount", labelId: "twoMonthsAgoLabel" }
    ];
    
    // Monatsnamen setzen
    targets.forEach((target, idx) => {
      const labelElem = document.getElementById(target.labelId);
      if (labelElem) {
        if (idx === 0) labelElem.innerText = getMonthName(target.year, target.month);
        else if (idx === 1) labelElem.innerText = getMonthName(target.year, target.month);
        else labelElem.innerText = getMonthName(target.year, target.month);
      }
    });
    
    // Zähler für jeden Monat initialisieren
    const counts = [0, 0, 0];
    
    if (historyArray && Array.isArray(historyArray)) {
      historyArray.forEach(entry => {
        if (entry?.time) {
          const date = new Date(entry.time);
          if (!isNaN(date.getTime())) {
            const entryYear = date.getFullYear();
            const entryMonth = date.getMonth() + 1;
            
            for (let i = 0; i < targets.length; i++) {
              if (entryYear === targets[i].year && entryMonth === targets[i].month) {
                counts[i]++;
                break;
              }
            }
          }
        }
      });
    }
    
    // Anzeige aktualisieren
    document.getElementById('currentMonthCount').innerText = counts[0];
    document.getElementById('lastMonthCount').innerText = counts[1];
    document.getElementById('twoMonthsAgoCount').innerText = counts[2];
  }
  
  // ==================== UI RENDER ====================
  function renderMainTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!data) { tbody.innerHTML = '<tr><td colspan="3">📭 Keine Daten</td></tr>'; return; }
    for (let name of names) {
      const count = data[name] || 0;
      const total = count * BEER_PRICE;
      const formattedTotal = formatEuro(total);
      let icons = count > 0 ? "🍺".repeat(Math.min(count, 20)) + (count > 20 ? ` +${count-20}` : "") : "—";
      tbody.innerHTML += `
        <tr>
          <td style="font-weight:500;">${escapeHtml(name)}</td>
          <td class="beer-icons">${icons}<br>💰 ${formattedTotal}</td>
          <td>
            <button class="add" data-name="${escapeHtml(name)}">➕ +1</button>
            <button class="pay" data-name-pay="${escapeHtml(name)}">💶 Zahlen</button>
          </td>
        </tr>
      `;
    }
    document.querySelectorAll('.add').forEach(btn => { btn.onclick = () => addBeer(btn.dataset.name); });
    document.querySelectorAll('.pay').forEach(btn => { btn.onclick = () => openPayPopup(btn.dataset.namePay); });
  }
  
  function renderMonthlyChart(historyArray) {
    const months = new Map();
    (historyArray || []).forEach(e => {
      if (e?.time) { 
        const d = new Date(e.time); 
        if (!isNaN(d)) {
          const key = `${d.getMonth()+1}/${d.getFullYear()}`;
          months.set(key, (months.get(key) || 0) + 1);
        }
      }
    });
    
    // Sortierte Labels
    const sortedLabels = Array.from(months.keys()).sort((a,b) => {
      const [mA, yA] = a.split('/');
      const [mB, yB] = b.split('/');
      return (parseInt(yA) - parseInt(yB)) || (parseInt(mA) - parseInt(mB));
    });
    
    const ctx = document.getElementById('beerChart').getContext('2d');
    if (beerChart) beerChart.destroy();
    beerChart = new Chart(ctx, { 
      type: 'bar', 
      data: { 
        labels: sortedLabels, 
        datasets: [{ label: '🍺 Biere/Monat', data: sortedLabels.map(l => months.get(l) || 0), backgroundColor: '#f9b43a', borderRadius: 12 }] 
      }, 
      options: { 
        responsive: true, 
        plugins: { legend: { labels: { color: '#fff' } } }, 
        scales: { y: { ticks: { color: '#ddd' } }, x: { ticks: { color: '#ffd966' } } } 
      } 
    });
    
    // Monatsübersicht aktualisieren
    updateMonthStats(historyArray);
  }
  
  function updateHistoryUI(historyArray) {
    const ul = document.getElementById('history');
    if (!ul) return;
    ul.innerHTML = '';
    if (!historyArray?.length) { ul.innerHTML = '<li>📭 Keine Einträge</li>'; return; }
    [...historyArray].reverse().forEach(e => { ul.innerHTML += `<li>🍺 ${e.name} – ${new Date(e.time).toLocaleString('de-DE')}</li>`; });
  }
  
  function renderQRTable() {
    const qrBody = document.getElementById('qrBody');
    if (!qrBody) return;
    qrBody.innerHTML = '';
    const baseUrl = window.location.origin + window.location.pathname;
    names.forEach(name => {
      const id = `qr-${name.replace(/[^a-zA-Z0-9]/g, "_")}`;
      qrBody.innerHTML += `<tr><td style="font-weight:bold;">${escapeHtml(name)}</td><td><canvas id="${id}" width="120" height="120"></canvas></td></tr>`;
    });
    setTimeout(() => {
      names.forEach(name => {
        const canvas = document.getElementById(`qr-${name.replace(/[^a-zA-Z0-9]/g, "_")}`);
        if (canvas) QRCode.toCanvas(canvas, `${baseUrl}?add=${encodeURIComponent(name)}`, { width: 110 });
      });
    }, 100);
  }
  
  // ==================== LOCALSTORAGE ====================
  function loadLocalData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : null;
  }
  
  function saveLocalData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  
  function renderLocalData() {
    let data = loadLocalData();
    if (!data) { const empty = {}; names.forEach(n => empty[n] = 0); data = { ...empty, history: [] }; saveLocalData(data); }
    names.forEach(n => { if (typeof data[n] !== 'number') data[n] = 0; });
    if (!data.history) data.history = [];
    renderMainTable(data);
    updateHistoryUI(data.history);
    renderMonthlyChart(data.history);
    updateConnectionStatus('💾 Lokaler Speicher (Offline-Modus)');
  }
  
  async function addBeerLocal(name) {
    let data = loadLocalData() || (() => { const d = {}; names.forEach(n => d[n] = 0); d.history = []; return d; })();
    data[name] = (data[name] || 0) + 1;
    data.history.push({ name, time: new Date().toISOString() });
    saveLocalData(data);
    renderLocalData();
  }
  
  async function payLocal(person) {
    if (!person) return;
    let data = loadLocalData();
    if (data) { data[person] = 0; saveLocalData(data); renderLocalData(); }
  }
  
  async function resetLocal() {
    if (!isAdminLoggedIn) { alert("Keine Berechtigung!"); return false; }
    let data = loadLocalData();
    if (data) { names.forEach(n => data[n] = 0); saveLocalData(data); renderLocalData(); alert("✅ Alle Biere zurückgesetzt"); return true; }
    return false;
  }
  
  async function clearHistoryLocal() {
    if (!isAdminLoggedIn) { alert("Keine Berechtigung!"); return false; }
    let data = loadLocalData();
    if (data) { data.history = []; saveLocalData(data); renderLocalData(); alert("✅ Verlauf gelöscht"); return true; }
    return false;
  }
  
  // ==================== FIREBASE ====================
  async function addBeerFirebase(name) {
    if (!mainDocRef) return;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    let current = snap.exists() ? snap.data() : {};
    current[name] = (current[name] || 0) + 1;
    current.history = [...(current.history || []), { name, time: new Date().toISOString() }];
    await setDoc(mainDocRef, current);
  }
  
  async function payFirebase(person) {
    if (!person || !mainDocRef) return;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      current[person] = 0;
      await setDoc(mainDocRef, current);
    }
  }
  
  async function resetFirebase() {
    if (!isAdminLoggedIn) { alert("Keine Berechtigung!"); return false; }
    if (!mainDocRef) return false;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      names.forEach(n => current[n] = 0);
      await setDoc(mainDocRef, current);
      alert("✅ Alle Biere zurückgesetzt");
      return true;
    }
    return false;
  }
  
  async function clearHistoryFirebase() {
    if (!isAdminLoggedIn) { alert("Keine Berechtigung!"); return false; }
    if (!mainDocRef) return false;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      current.history = [];
      await setDoc(mainDocRef, current);
      alert("✅ Verlauf gelöscht");
      return true;
    }
    return false;
  }
  
  // ==================== FIREBASE INIT ====================
  async function initFirebase() {
    updateConnectionStatus('📡 Verbinde mit Firebase...');
    
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
      const { getFirestore, doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
      
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getFirestore(app);
      mainDocRef = doc(db, "strichliste", "juii_main");
      
      const testSnap = await getDoc(mainDocRef);
      
      if (!testSnap.exists()) {
        const emptyData = { history: [] };
        names.forEach(n => emptyData[n] = 0);
        renderMainTable(emptyData);
        updateHistoryUI([]);
        renderMonthlyChart([]);
      } else {
        const data = testSnap.data();
        const renderData = {};
        names.forEach(n => renderData[n] = data[n] || 0);
        renderMainTable(renderData);
        updateHistoryUI(data.history || []);
        renderMonthlyChart(data.history || []);
      }
      
      updateConnectionStatus('✅ Firebase verbunden (Live-Synchronisation)');
      useFirebase = true;
      
      unsubscribe = onSnapshot(mainDocRef, (snapshot) => {
        if (snapshot.exists()) {
          const snapData = snapshot.data();
          const newData = {};
          names.forEach(n => newData[n] = typeof snapData[n] === 'number' ? snapData[n] : 0);
          renderMainTable(newData);
          updateHistoryUI(snapData.history || []);
          renderMonthlyChart(snapData.history || []);
        }
      });
      
      return true;
    } catch (err) {
      console.error("Firebase Fehler:", err);
      updateConnectionStatus('⚠️ Firebase nicht erreichbar – Verwende lokalen Speicher');
      renderLocalData();
      useFirebase = false;
      return false;
    }
  }
  
  // ==================== DISPATCHER ====================
  async function addBeer(name) {
    if (useFirebase && mainDocRef) await addBeerFirebase(name);
    else await addBeerLocal(name);
  }
  
  async function pay(person) {
    if (useFirebase && mainDocRef) await payFirebase(person);
    else await payLocal(person);
  }
  
  // ==================== POPUP ====================
  async function openPayPopup(name) {
    currentPayPerson = name;
    let count = 0;
    if (useFirebase && mainDocRef) {
      try {
        const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const snap = await getDoc(mainDocRef);
        count = snap.exists() ? (snap.data()[name] || 0) : 0;
      } catch(e) { count = 0; }
    } else {
      const data = loadLocalData();
      count = data ? (data[name] || 0) : 0;
    }
    const total = count * BEER_PRICE;
    const formattedTotal = formatEuro(total);
    document.getElementById('popupName').innerText = name;
    document.getElementById('popupSum').innerHTML = `${count} 🍺 = <strong>${formattedTotal}</strong>`;
    document.getElementById('popup').style.display = 'flex';
  }
  
  async function onConfirmPayment() {
    if (currentPayPerson) await pay(currentPayPerson);
    document.getElementById('popup').style.display = 'none';
    currentPayPerson = null;
  }
  
  function closePopup() {
    document.getElementById('popup').style.display = 'none';
    currentPayPerson = null;
  }
  
  // ==================== ADMIN LOGIN ====================
  function loginAdmin() {
    const passwordInput = document.getElementById('adminPassword');
    const password = passwordInput.value;
    
    if (password === ADMIN_PASSWORD) {
      isAdminLoggedIn = true;
      sessionStorage.setItem('adminAuth', 'true');
      document.getElementById('adminActions').style.display = 'block';
      passwordInput.value = '';
      alert("✅ Login erfolgreich!");
    } else {
      alert("❌ Falsches Passwort!");
      passwordInput.value = '';
    }
  }
  
  function logoutAdmin() {
    isAdminLoggedIn = false;
    sessionStorage.removeItem('adminAuth');
    document.getElementById('adminActions').style.display = 'none';
  }
  
  function checkAdminSession() {
    if (sessionStorage.getItem('adminAuth') === 'true') {
      isAdminLoggedIn = true;
      document.getElementById('adminActions').style.display = 'block';
    }
  }
  
  // ==================== INIT ====================
  function handleUrlParam() {
    const params = new URLSearchParams(window.location.search);
    const add = params.get('add');
    if (add && names.includes(add)) {
      setTimeout(() => addBeer(add), 800);
      window.history.replaceState({}, "", window.location.pathname);
    }
  }
  
  async function start() {
    checkAdminSession();
    renderQRTable();
    await initFirebase();
    handleUrlParam();
    
    const loginBtn = document.getElementById('loginBtn');
    if (loginBtn) loginBtn.addEventListener('click', loginAdmin);
    
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.addEventListener('click', logoutAdmin);
    
    const confirmBtn = document.getElementById('confirmPayBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', onConfirmPayment);
    
    const closeBtn = document.getElementById('closePopupBtn');
    if (closeBtn) closeBtn.addEventListener('click', closePopup);
    
    const resetBtn = document.getElementById('resetAllBtn');
    if (resetBtn) resetBtn.addEventListener('click', async () => { 
      if (useFirebase) await resetFirebase(); 
      else await resetLocal(); 
    });
    
    const clearBtn = document.getElementById('clearHistoryBtn');
    if (clearBtn) clearBtn.addEventListener('click', async () => { 
      if (useFirebase) await clearHistoryFirebase(); 
      else await clearHistoryLocal(); 
    });
  }
  
  start();
</script>
</body>
</html>
