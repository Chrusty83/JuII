<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JUII Bierdeckel</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px 12px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f9b43a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .glass-card {
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 20px 0;
      border: 1px solid #2c2c3a;
    }
    
    .total-beer-badge {
      background: #2e7d64;
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .toast-popup {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2e7d64;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      z-index: 1002;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeInUp 0.3s ease-out;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    footer {
      font-size: 11px;
      margin-top: 30px;
      opacity: 0.5;
      color: #888;
    }
    
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #252536;
      border-radius: 20px;
      padding: 15px 25px;
      min-width: 140px;
      text-align: center;
      border: 1px solid #3a3a4a;
    }
    .stat-month {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffd966;
      margin-bottom: 8px;
    }
    .stat-count {
      font-size: 2.2rem;
      font-weight: bold;
      color: #f9b43a;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 5px;
    }
    #chartContainer {
      background: #1a1a28;
      border-radius: 28px;
      padding: 16px;
      margin: 28px 0;
    }
    canvas#beerChart { max-height: 320px; width: 100% !important; }
    h2 { margin: 1rem 0 0.75rem; color: #ffd966; }
  </style>
</head>
<body>

<h1>🍺 JUII BIERDECKEL 🍺</h1>

<div class="glass-card">
  <div id="totalBeerDisplay" class="total-beer-badge">🍺 Gesamt: 0 Biere</div>
</div>

<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
  
  <div id="monthStats" class="stats-container">
    <div class="stat-card">
      <div class="stat-month" id="currentMonthLabel">-</div>
      <div class="stat-count" id="currentMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="lastMonthLabel">-</div>
      <div class="stat-count" id="lastMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="twoMonthsAgoLabel">-</div>
      <div class="stat-count" id="twoMonthsAgoCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
  </div>
</div>

<footer><span id="connectionStatus"></span></footer>

<script>
// ==================== KONFIGURATION ====================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6"
};

// ==================== GLOBALE VARIABLEN ====================
let useFirebase = false;
let mainDocRef = null;
let unsubscribe = null;
let beerChart = null;

const STORAGE_KEY = "juii_bierdeckel_data";

// ==================== HILFSFUNKTIONEN ====================
function formatEuro(amount) {
  if (amount === Math.floor(amount)) {
    return `${Math.floor(amount)} €`;
  } else {
    return `${amount.toFixed(2)} €`;
  }
}

function updateConnectionStatus(msg) {
  const div = document.getElementById('connectionStatus');
  if (div) div.innerHTML = msg;
}

// ==================== GESAMTANZEIGE ====================
function getTotalBeerCount(data) {
  if (!data || !data.beers) return 0;
  return data.beers;
}

function updateTotalDisplay(data) {
  const totalDiv = document.getElementById('totalBeerDisplay');
  if (totalDiv) {
    const total = getTotalBeerCount(data);
    totalDiv.innerHTML = `🍺 Gesamt: ${total} ${total === 1 ? 'Bier' : 'Biere'}`;
  }
}

// ==================== TOAST-NACHRICHT ====================
function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast-popup';
  toast.style.background = isError ? '#c44536' : '#2e7d64';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ==================== MONATSÜBERSICHT ====================
function getMonthName(year, month) {
  return new Date(year, month - 1, 1).toLocaleString('de-DE', { month: 'long', year: 'numeric' });
}

function updateMonthStats(historyArray) {
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  
  const targets = [
    { year: currentYear, month: currentMonth, elementId: "currentMonthCount", labelId: "currentMonthLabel" },
    { year: currentMonth === 1 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 12 : currentMonth - 1, elementId: "lastMonthCount", labelId: "lastMonthLabel" },
    { year: currentMonth <= 2 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 11 : (currentMonth === 2 ? 12 : currentMonth - 2), elementId: "twoMonthsAgoCount", labelId: "twoMonthsAgoLabel" }
  ];
  
  targets.forEach(t => {
    const el = document.getElementById(t.labelId);
    if (el) el.innerText = getMonthName(t.year, t.month);
  });
  
  const counts = [0, 0, 0];
  if (historyArray && Array.isArray(historyArray)) {
    historyArray.forEach(entry => {
      if (entry?.time) {
        const date = new Date(entry.time);
        if (!isNaN(date.getTime())) {
          const entryYear = date.getFullYear();
          const entryMonth = date.getMonth() + 1;
          for (let i = 0; i < targets.length; i++) {
            if (entryYear === targets[i].year && entryMonth === targets[i].month) {
              counts[i]++;
              break;
            }
          }
        }
      }
    });
  }
  
  document.getElementById('currentMonthCount').innerText = counts[0];
  document.getElementById('lastMonthCount').innerText = counts[1];
  document.getElementById('twoMonthsAgoCount').innerText = counts[2];
}

// ==================== MONATS-CHART RENDERN ====================
function renderMonthlyChart(historyArray) {
  const months = new Map();
  if (historyArray && Array.isArray(historyArray)) {
    historyArray.forEach(e => {
      if (e?.time) {
        const d = new Date(e.time);
        if (!isNaN(d)) {
          const key = `${d.getMonth()+1}/${d.getFullYear()}`;
          months.set(key, (months.get(key) || 0) + 1);
        }
      }
    });
  }
  
  const sortedLabels = Array.from(months.keys()).sort((a,b) => {
    const [mA, yA] = a.split('/');
    const [mB, yB] = b.split('/');
    return (parseInt(yA) - parseInt(yB)) || (parseInt(mA) - parseInt(mB));
  });
  const chartData = sortedLabels.map(l => months.get(l) || 0);
  
  const ctx = document.getElementById('beerChart').getContext('2d');
  if (beerChart) beerChart.destroy();
  beerChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sortedLabels,
      datasets: [{
        label: '🍺 Biere/Monat',
        data: chartData,
        backgroundColor: '#f9b43a',
        borderRadius: 12
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#fff' } } },
      scales: { y: { ticks: { color: '#ddd' } }, x: { ticks: { color: '#ffd966' } } }
    }
  });
  
  updateMonthStats(historyArray);
}

// ==================== LOCALSTORAGE FUNKTIONEN ====================
function loadLocalData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : null;
}

function saveLocalData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ==================== UI AKTUALISIEREN ====================
function refreshUI() {
  if (useFirebase && mainDocRef) {
    import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js").then(({ getDoc }) => {
      getDoc(mainDocRef).then(snap => {
        if (snap.exists()) {
          const data = snap.data();
          updateTotalDisplay(data);
          renderMonthlyChart(data.history || []);
        }
      });
    });
  } else {
    let data = loadLocalData();
    if (!data) {
      data = { beers: 0, history: [] };
      saveLocalData(data);
    }
    updateTotalDisplay(data);
    renderMonthlyChart(data.history || []);
  }
}

// ==================== FIREBASE INITIALISIERUNG ====================
async function initFirebase() {
  updateConnectionStatus('📡 Verbinde mit Firebase...');
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
    const { getFirestore, doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    mainDocRef = doc(db, "strichliste", "juii_main");
    const testSnap = await getDoc(mainDocRef);
    if (!testSnap.exists()) {
      const emptyData = { beers: 0, history: [] };
      updateTotalDisplay(emptyData);
      renderMonthlyChart([]);
    } else {
      const data = testSnap.data();
      updateTotalDisplay(data);
      renderMonthlyChart(data.history || []);
    }
    updateConnectionStatus('✅ Firebase verbunden (Live-Synchronisation)');
    useFirebase = true;
    unsubscribe = onSnapshot(mainDocRef, (snapshot) => {
      if (snapshot.exists()) {
        const snapData = snapshot.data();
        updateTotalDisplay(snapData);
        renderMonthlyChart(snapData.history || []);
      }
    });
    return true;
  } catch (err) {
    console.error("Firebase Fehler:", err);
    updateConnectionStatus('⚠️ Firebase nicht erreichbar – Verwende lokalen Speicher');
    renderLocalData();
    useFirebase = false;
    return false;
  }
}

// ==================== LOKALEN SPEICHER INITIALISIEREN ====================
function renderLocalData() {
  let data = loadLocalData();
  if (!data) {
    data = { beers: 0, history: [] };
    saveLocalData(data);
  }
  updateTotalDisplay(data);
  renderMonthlyChart(data.history || []);
  updateConnectionStatus('💾 Lokaler Speicher (Offline-Modus)');
}

// ==================== START ====================
async function start() {
  await initFirebase();
}

start();
</script>
</body>
</html>
