<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bier-Rückblick</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #111;
            color: #f0f0f0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px 12px 40px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #f9b43a, #ffd966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }
        .controls {
            background: #1a1a28;
            border-radius: 28px;
            padding: 20px;
            margin: 0 auto 28px;
            max-width: 600px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            align-items: center;
            border: 1px solid #2c2c3a;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            font-weight: bold;
            color: #ffd966;
            font-size: 1rem;
        }
        select {
            background: #252536;
            color: #f0f0f0;
            border: 1px solid #3a3a4a;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:hover,
        select:focus {
            border-color: #f9b43a;
        }
        #chartContainer {
            background: #1a1a28;
            border-radius: 28px;
            padding: 20px;
            margin: 0 auto 28px;
            max-width: 800px;
            border: 1px solid #2c2c3a;
        }
        canvas#personalChart {
            max-height: 400px;
            width: 100% !important;
        }
        .stat-box {
            margin-top: 10px;
            color: #f9b43a;
            font-weight: bold;
            font-size: 1.1rem;
            background: #252536;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }
        footer {
            font-size: 11px;
            margin-top: 30px;
            opacity: 0.5;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>🍺 Bier-Rückblick</h1>

    <div class="controls">
        <div class="control-group">
            <label for="nameSelect">👤 Biertrinker:</label>
            <select id="nameSelect"></select>
        </div>
        <div class="control-group">
            <label for="metricSelect">📊 Metrik:</label>
            <select id="metricSelect">
                <option value="count">Anzahl Biere pro Monat</option>
                <option value="avgDuration">Ø Trinkdauer pro Tag (Min., ab 2 Min.)</option>
                <option value="fastest">Schnellstes Bier (Min., ab 2 Min.)</option>
            </select>
        </div>
    </div>

    <div id="chartContainer">
        <div id="chartLoading" class="loading">📡 Warte auf Daten...</div>
        <canvas id="personalChart" style="display: none;"></canvas>
        <div id="averageDisplay" class="stat-box"></div>
        <div id="extraStatsDisplay" class="stat-box"></div>
    </div>

    <footer><span id="connectionStatus">🔌 Verbinde...</span></footer>

    <script>
        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
            authDomain: "juii-strichliste.firebaseapp.com",
            projectId: "juii-strichliste",
            storageBucket: "juii-strichliste.firebasestorage.app",
            messagingSenderId: "8081599971",
            appId: "1:8081599971:web:6cc277281b040d995304d6"
        };

        const NAMES = ["Andi", "Basti G.", "Benny", "Bernd G.", "Bernd K.", "Chris", "Clemens", "Dietmar", "Donde",
            "Jakob", "Lukas", "Max", "Micha", "Hainzl", "Philipp", "Basti B.", "Simon", "Schwob", "Tim", "Timo", "Tom"
        ];

        let mainDocRef = null;
        let unsubscribe = null;
        let personalChart = null;
        let currentHistory = [];

        function isPaymentEntry(entry) {
            return entry?.name && (entry.name.includes('bezahlt') || entry.name.includes('Bezahlung') || entry.name
                .includes('entfernt'));
        }

        function filterBeerEntries(historyArray) {
            return historyArray?.filter(e => e?.name && !e.name.includes('bezahlt') && !e.name.includes('entfernt') && !e
                .name.includes('Bezahlung')) || [];
        }

        function getLast12Months() {
            const now = new Date();
            const months = [];
            const monthNames = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
            for (let i = 0; i < 12; i++) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                months.push({
                    key: `${d.getFullYear()}-${d.getMonth()+1}`,
                    label: `${monthNames[d.getMonth()]} ${d.getFullYear()}`
                });
            }
            return months;
        }

        function getMonthlyCounts(historyArray, name) {
            const months = getLast12Months();
            const counts = new Array(12).fill(null);
            filterBeerEntries(historyArray).forEach(entry => {
                if (entry.name !== name) return;
                const d = new Date(entry.time);
                if (isNaN(d)) return;
                const key = `${d.getFullYear()}-${d.getMonth()+1}`;
                const idx = months.findIndex(m => m.key === key);
                if (idx !== -1) {
                    if (counts[idx] === null) counts[idx] = 1;
                    else counts[idx]++;
                }
            });
            return counts;
        }

        function getAverageDrinkDurationPerDay(historyArray, name) {
            const months = getLast12Months();
            const result = new Array(12).fill(null);
            const beerEntries = filterBeerEntries(historyArray).filter(e => e.name === name);

            for (let i = 0; i < 12; i++) {
                const month = months[i];
                const monthBeers = beerEntries.filter(e => {
                    const d = new Date(e.time);
                    if (isNaN(d)) return false;
                    return `${d.getFullYear()}-${d.getMonth()+1}` === month.key;
                });

                const sorted = [...monthBeers].sort((a, b) => new Date(a.time) - new Date(b.time));
                const dayMap = {};
                sorted.forEach(entry => {
                    const d = new Date(entry.time);
                    const dayKey = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
                    if (!dayMap[dayKey]) dayMap[dayKey] = [];
                    dayMap[dayKey].push(new Date(entry.time));
                });

                const dayAverages = [];
                for (const day in dayMap) {
                    const times = dayMap[day];
                    if (times.length < 2) continue;
                    let totalDiff = 0;
                    let validIntervals = 0;
                    for (let j = 1; j < times.length; j++) {
                        const diff = (times[j] - times[j - 1]) / (1000 * 60);
                        if (diff >= 2) {
                            totalDiff += diff;
                            validIntervals++;
                        }
                    }
                    if (validIntervals > 0) {
                        dayAverages.push(totalDiff / validIntervals);
                    }
                }

                if (dayAverages.length > 0) {
                    result[i] = dayAverages.reduce((a, b) => a + b, 0) / dayAverages.length;
                }
            }
            return result;
        }

        function getFastestDrink(historyArray, name) {
            const months = getLast12Months();
            const result = new Array(12).fill(null);
            const beerEntries = filterBeerEntries(historyArray).filter(e => e.name === name);

            for (let i = 0; i < 12; i++) {
                const month = months[i];
                const monthBeers = beerEntries.filter(e => {
                    const d = new Date(e.time);
                    if (isNaN(d)) return false;
                    return `${d.getFullYear()}-${d.getMonth()+1}` === month.key;
                });

                const sorted = [...monthBeers].sort((a, b) => new Date(a.time) - new Date(b.time));
                if (sorted.length < 2) continue;

                let minDiff = Infinity;
                for (let j = 1; j < sorted.length; j++) {
                    const diff = (new Date(sorted[j].time) - new Date(sorted[j - 1].time)) / (1000 * 60);
                    if (diff >= 2 && diff < minDiff) {
                        minDiff = diff;
                    }
                }
                if (minDiff !== Infinity) result[i] = minDiff;
            }
            return result;
        }

        function fmtNum(val) {
            // Keine Nachkommastellen bei ganzen Zahlen
            if (val % 1 === 0) return val.toString();
            return val.toFixed(2);
        }

        function updateChart() {
            const name = document.getElementById('nameSelect').value;
            const metric = document.getElementById('metricSelect').value;
            const averageDisplay = document.getElementById('averageDisplay');
            const extraStatsDisplay = document.getElementById('extraStatsDisplay');
            if (!name || !currentHistory.length) {
                averageDisplay.textContent = '';
                extraStatsDisplay.innerHTML = '';
                return;
            }

            const months = getLast12Months();
            let data, yLabel;

            if (metric === 'count') {
                data = getMonthlyCounts(currentHistory, name);
                yLabel = 'Anzahl Biere';
            } else if (metric === 'avgDuration') {
                data = getAverageDrinkDurationPerDay(currentHistory, name);
                yLabel = 'Minuten (Ø pro Tag)';
            } else if (metric === 'fastest') {
                data = getFastestDrink(currentHistory, name);
                yLabel = 'Minuten (Minimum)';
            }

            const canvas = document.getElementById('personalChart');
            const loadingDiv = document.getElementById('chartLoading');

            if (personalChart) personalChart.destroy();

            const hasData = data.some(v => v !== null && v !== undefined);
            if (!hasData) {
                canvas.style.display = 'none';
                loadingDiv.style.display = 'block';
                loadingDiv.textContent = '📭 Keine Daten für diesen Zeitraum';
                averageDisplay.textContent = '';
                extraStatsDisplay.innerHTML = '';
                return;
            }

            loadingDiv.style.display = 'none';
            canvas.style.display = 'block';

            const validData = data.filter(v => v !== null && v !== undefined);
            let avgText = '';
            if (validData.length > 0) {
                const sum = validData.reduce((a, b) => a + b, 0);
                const avg = sum / validData.length;
                if (metric === 'count') {
                    avgText = `📊 Durchschnitt: ${fmtNum(avg)} Biere/Monat (${validData.length} Monate mit Daten)`;
                } else {
                    avgText = `📊 Durchschnitt: ${fmtNum(avg)} Minuten (${validData.length} Monate mit Daten)`;
                }
            } else {
                avgText = 'Keine gültigen Monate für Durchschnitt';
            }
            averageDisplay.textContent = avgText;

            // Zusätzliche Durchschnittswerte (untereinander)
            const personBeersAll = filterBeerEntries(currentHistory).filter(e => e.name === name);
            if (personBeersAll.length === 0) {
                extraStatsDisplay.innerHTML = 'Keine Biereinträge vorhanden.';
            } else {
                const days = new Set();
                const thursdays = new Set();
                let thursdayTotal = 0;
                personBeersAll.forEach(e => {
                    const d = new Date(e.time);
                    if (isNaN(d)) return;
                    const dateKey = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
                    days.add(dateKey);
                    if (d.getDay() === 4) { // Donnerstag
                        thursdays.add(dateKey);
                        thursdayTotal++;
                    }
                });
                const avgPerDay = personBeersAll.length / days.size;
                const avgThursday = thursdays.size > 0 ? thursdayTotal / thursdays.size : 0;
                // Werte untereinander mit Zeilenumbruch
                extraStatsDisplay.innerHTML = `📅 Ø Biere/Tag: ${fmtNum(avgPerDay)}<br>🍻 Ø Biere/Do: ${fmtNum(avgThursday)}`;
            }

            const ctx = canvas.getContext('2d');
            personalChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months.map(m => m.label),
                    datasets: [{
                        label: yLabel,
                        data: data,
                        backgroundColor: '#f9b43a',
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: {
                                color: '#fff'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const raw = context.raw;
                                    if (raw === null || raw === undefined) return 'Keine Daten';
                                    if (metric === 'count') return `${raw} Bier(e)`;
                                    return `${raw.toFixed(1)} Min.`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: '#ddd',
                                callback: function(value) {
                                    if (metric === 'count') return Number.isInteger(value) ? value : '';
                                    return value;
                                }
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#ffd966',
                                maxRotation: 45,
                                minRotation: 45,
                                font: {
                                    size: 9
                                }
                            },
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        function populateNameDropdown() {
            const select = document.getElementById('nameSelect');
            select.innerHTML = NAMES.map(name => `<option value="${name}">${name}</option>`).join('');
            select.value = NAMES[0];
            select.addEventListener('change', updateChart);
            document.getElementById('metricSelect').addEventListener('change', updateChart);
        }

        function updateConnectionStatus(msg) {
            document.getElementById('connectionStatus').textContent = msg;
        }

        async function initFirebase() {
            updateConnectionStatus('📡 Verbinde mit Firebase...');
            try {
                const { initializeApp } = await import(
                    "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                const { getFirestore, doc, getDoc, onSnapshot } = await import(
                    "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                const app = initializeApp(FIREBASE_CONFIG);
                const db = getFirestore(app);
                mainDocRef = doc(db, "strichliste", "juii_main");
                const snap = await getDoc(mainDocRef);

                if (!snap.exists()) {
                    throw new Error("Keine Daten in der Datenbank gefunden");
                }

                const data = snap.data();
                currentHistory = data.history || [];
                updateChart();
                updateConnectionStatus('✅ Live-Daten aktiv');

                unsubscribe = onSnapshot(mainDocRef, (s) => {
                    if (s.exists()) {
                        currentHistory = s.data().history || [];
                        updateChart();
                        updateConnectionStatus('✅ Live-Daten aktiv');
                    }
                });
            } catch (e) {
                console.error('Firebase Fehler:', e);
                updateConnectionStatus('⚠️ Firebase nicht erreichbar');
            }
        }

        populateNameDropdown();
        initFirebase();
    </script>
</body>
</html>
