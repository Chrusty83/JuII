<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strichliste</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 60%;
    }

    th, td {
      border: 1px solid #444;
      padding: 12px;
    }

    th {
      background-color: #222;
    }

    button {
      padding: 8px 16px;
      background-color: #0a84ff;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background-color: #0066cc;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>

<h1>Strichliste</h1>

<table>
  <tr>
    <th>Name</th>
    <th>Striche</th>
    <th>Aktion</th>
  </tr>

  <tr>
    <td>Bernd</td>
    <td id="Bernd">0</td>
    <td><button onclick="add('Bernd')">+1</button></td>
  </tr>

  <tr>
    <td>Basti</td>
    <td id="Basti">0</td>
    <td><button onclick="add('Basti')">+1</button></td>
  </tr>

  <tr>
    <td>Dietmar</td>
    <td id="Dietmar">0</td>
    <td><button onclick="add('Dietmar')">+1</button></td>
  </tr>
</table>

<h2>Verlauf</h2>
<ul id="history"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ref = doc(db, "strichliste", "main");

  async function load() {
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();

      ["Bernd", "Basti", "Dietmar"].forEach(name => {
        document.getElementById(name).innerText = data[name] || 0;
      });

      renderHistory(data.history || []);
    }
  }

  function renderHistory(history) {
    const ul = document.getElementById("history");
    ul.innerHTML = "";

    history.slice().reverse().forEach(entry => {
      const li = document.createElement("li");
      li.innerText = `${entry.name} → ${entry.time}`;
      ul.appendChild(li);
    });
  }

  window.add = async function(name) {
    const snap = await getDoc(ref);

    let data = {
      Bernd: 0,
      Basti: 0,
      Dietmar: 0,
      history: []
    };

    if (snap.exists()) {
      data = snap.data();
    }

    data[name] = (data[name] || 0) + 1;

    data.history.push({
      name: name,
      time: new Date().toLocaleString()
    });

    await setDoc(ref, data);

    load();
  };

  load();

  // 🔗 Link-basierte Aktion
  const params = new URLSearchParams(window.location.search);
  const user = params.get("add");

  if (user && ["Bernd", "Basti", "Dietmar"].includes(user)) {
    add(user);
  }
</script>

</body>
</html>
