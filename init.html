<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strichliste</title>
</head>
<body>
  <h1>Strichliste</h1>
  <h2 id="name"></h2>
  <p id="count">0</p>
  <button onclick="add()">+1</button>
  <button onclick="reset()">Reset</button>

  <ul id="history"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 📌 ID aus URL holen
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id") || "default";

    document.getElementById("name").innerText = id;

    const ref = doc(db, "lists", id);

    async function load() {
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();
        document.getElementById("count").innerText = data.value;

        const history = data.history || [];
        renderHistory(history);
      }
    }

    function renderHistory(history) {
      const ul = document.getElementById("history");
      ul.innerHTML = "";

      history.slice().reverse().forEach(entry => {
        const li = document.createElement("li");
        li.innerText = entry.time;
        ul.appendChild(li);
      });
    }

    window.add = async function() {
      const snap = await getDoc(ref);

      let value = 0;
      let history = [];

      if (snap.exists()) {
        value = snap.data().value;
        history = snap.data().history || [];
      }

      value++;

      history.push({
        time: new Date().toLocaleString()
      });

      await setDoc(ref, { value, history });

      load();
    };

    window.reset = async function() {
      await setDoc(ref, { value: 0, history: [] });
      load();
    };

    load();
  </script>
</body>
</html>
