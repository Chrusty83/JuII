<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OGA Bierstatistik</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px 12px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f9b43a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .glass-card {
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 20px 0;
      border: 1px solid #2c2c3a;
    }
    
    .total-beer-badge {
      background: #2e7d64;
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .total-beer-alltime {
      background: #5a3e2b;
      color: #ffd966;
      padding: 8px 20px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 15px;
      margin-left: 10px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #252536;
      border-radius: 20px;
      padding: 12px 18px;
      min-width: 120px;
      text-align: center;
      border: 1px solid #3a3a4a;
    }
    .stat-month, .stat-week {
      font-size: 0.9rem;
      font-weight: bold;
      color: #ffd966;
      margin-bottom: 6px;
    }
    .stat-count {
      font-size: 1.8rem;
      font-weight: bold;
      color: #f9b43a;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 5px;
    }
    #weeklyChartContainer, #chartContainer {
      background: #1a1a28;
      border-radius: 28px;
      padding: 16px;
      margin: 28px 0;
    }
    canvas#weeklyChart, canvas#beerChart { 
      max-height: 320px; 
      width: 100% !important; 
    }
    h2 { margin: 1rem 0 0.75rem; color: #ffd966; }
    .badge-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    
    .ranking-container {
      background: #1a1a28;
      border-radius: 28px;
      padding: 20px;
      margin: 28px 0;
    }
    .ranking-week {
      background: #252536;
      border-radius: 24px;
      padding: 16px;
      margin-bottom: 24px;
      border-left: 4px solid #f9b43a;
    }
    .ranking-week-title {
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffd966;
      margin-bottom: 15px;
      text-align: left;
      padding-bottom: 8px;
      border-bottom: 1px solid #3a3a4a;
    }
    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ranking-item {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #1e1e2e;
      padding: 10px 15px;
      border-radius: 16px;
      transition: transform 0.2s;
    }
    .ranking-item:hover {
      transform: translateX(5px);
      background: #2a2a3a;
    }
    .rank-number {
      font-size: 1.5rem;
      font-weight: bold;
      width: 50px;
      text-align: center;
    }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }
    .rank-name {
      flex: 1;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
    }
    .rank-count {
      font-size: 1.3rem;
      font-weight: bold;
      color: #f9b43a;
      background: #2a2a3a;
      padding: 4px 12px;
      border-radius: 40px;
    }
    footer {
      font-size: 11px;
      margin-top: 30px;
      opacity: 0.5;
      color: #888;
    }
  </style>
</head>
<body>

<h1>🍺 OGA BIERSTATISTIK 🍺</h1>

<div class="glass-card">
  <div class="badge-container">
    <div id="totalBeerDisplay" class="total-beer-badge">🍺 Aktueller Monat: 0 Biere</div>
    <div id="totalAllTimeDisplay" class="total-beer-alltime">📊 Alle Zeiten: 0 Biere</div>
  </div>
</div>

<div id="weeklyChartContainer">
  <h2>📊 Bierkonsum pro Woche (letzte 8 Wochen)</h2>
  <canvas id="weeklyChart" width="800" height="350"></canvas>
  <div id="weekStats" class="weeks-grid"></div>
</div>

<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
  <div id="monthStats" class="stats-container">
    <div class="stat-card">
      <div class="stat-month" id="currentMonthLabel">-</div>
      <div class="stat-count" id="currentMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="lastMonthLabel">-</div>
      <div class="stat-count" id="lastMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="twoMonthsAgoLabel">-</div>
      <div class="stat-count" id="twoMonthsAgoCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
  </div>
</div>

<div class="ranking-container">
  <h2>🏆 Top 3 Biertrinker pro Woche</h2>
  <div id="weeklyRanking"></div>
</div>

<footer><span id="connectionStatus"></span></footer>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6"
};

let useFirebase = false;
let mainDocRef = null;
let unsubscribe = null;
let beerChart = null;
let weeklyChart = null;

const STORAGE_KEY = "juii_bierdeckel_data";
const NAMES = ["Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris","Clemens","Dietmar","Donde","Jakob","Lukas","Max","Micha","Hainzl","Philipp","Basti B.","Simon","Schwob","Tim","Timo","Tom"];

function updateConnectionStatus(msg) {
  const div = document.getElementById('connectionStatus');
  if (div) div.innerHTML = msg;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

// Berechnet die Kalenderwoche (ISO 8601: Montag bis Sonntag)
function getWeekNumber(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  // Donnerstag der aktuellen Woche bestimmen
  const thursday = new Date(d);
  thursday.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
  const year = thursday.getFullYear();
  // Erster Donnerstag des Jahres
  const firstThursday = new Date(year, 0, 4);
  firstThursday.setDate(firstThursday.getDate() - ((firstThursday.getDay() + 6) % 7));
  const week = Math.floor((thursday - firstThursday) / (7 * 24 * 60 * 60 * 1000)) + 1;
  return { year, week };
}

// Gibt den Montag einer KW zurück
function getMondayOfWeek(year, week) {
  const firstJan = new Date(year, 0, 1);
  const dayOfWeek = firstJan.getDay();
  const daysToFirstMonday = (dayOfWeek === 1 ? 0 : (8 - dayOfWeek)) % 7;
  const firstMonday = new Date(year, 0, 1 + daysToFirstMonday);
  const monday = new Date(firstMonday);
  monday.setDate(firstMonday.getDate() + (week - 1) * 7);
  return monday;
}

// Gibt den Zeitraum (Montag - Sonntag) für eine KW zurück
function getWeekRange(year, week) {
  const monday = getMondayOfWeek(year, week);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const formatDate = (d) => `${d.getDate()}.${d.getMonth()+1}`;
  return `${formatDate(monday)} - ${formatDate(sunday)}`;
}

// Liefert die letzten 8 Wochen (aktuelle Woche zuerst, absteigend)
function getLast8Weeks() {
  const today = new Date();
  const weeks = [];
  const seen = new Set();
  
  // Gehe von der aktuellen Woche rückwärts, sammle einzigartige Wochen
  for (let i = 0; i < 20; i++) {
    const date = new Date(today);
    date.setDate(today.getDate() - (i * 7));
    const { year, week } = getWeekNumber(date);
    const key = `${year}-${week}`;
    if (!seen.has(key)) {
      seen.add(key);
      weeks.push({ year, week, label: `KW${week}`, range: getWeekRange(year, week) });
      if (weeks.length === 8) break;
    }
  }
  return weeks;
}

function getAllTimeBeerCount(historyArray) {
  return historyArray?.length || 0;
}

function getCurrentMonthCount(historyArray) {
  if (!historyArray) return 0;
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  return historyArray.filter(entry => {
    if (!entry?.time) return false;
    const date = new Date(entry.time);
    return !isNaN(date) && date.getFullYear() === currentYear && date.getMonth() + 1 === currentMonth;
  }).length;
}

function updateTotalDisplay(historyArray) {
  document.getElementById('totalBeerDisplay').innerHTML = `🍺 Aktueller Monat: ${getCurrentMonthCount(historyArray)} Biere`;
  document.getElementById('totalAllTimeDisplay').innerHTML = `📊 Alle Zeiten: ${getAllTimeBeerCount(historyArray)} Biere`;
}

function getWeeklyData(historyArray, weeks) {
  const consumption = new Array(weeks.length).fill(0);
  const perPerson = weeks.map(() => ({}));
  
  if (!historyArray) return { consumption, perPerson };
  
  historyArray.forEach(entry => {
    if (!entry?.time || !entry?.name) return;
    const date = new Date(entry.time);
    if (isNaN(date)) return;
    const { year, week: entryWeek } = getWeekNumber(date);
    
    for (let i = 0; i < weeks.length; i++) {
      if (weeks[i].year === year && weeks[i].week === entryWeek) {
        consumption[i]++;
        if (!perPerson[i][entry.name]) perPerson[i][entry.name] = 0;
        perPerson[i][entry.name]++;
        break;
      }
    }
  });
  
  return { consumption, perPerson };
}

function renderWeeklyChart(historyArray) {
  const weeks = getLast8Weeks();
  const { consumption, perPerson } = getWeeklyData(historyArray, weeks);
  
  const ctx = document.getElementById('weeklyChart').getContext('2d');
  if (weeklyChart) weeklyChart.destroy();
  weeklyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weeks.map(w => w.label),
      datasets: [{
        label: '🍺 Biere pro Woche',
        data: consumption,
        backgroundColor: '#5a9e4e',
        borderRadius: 10
      }]
    },
    options: {
      responsive: true,
      plugins: { 
        legend: { labels: { color: '#fff' } },
        tooltip: { callbacks: { afterLabel: (ctx) => `📅 ${weeks[ctx.dataIndex].range}` } }
      },
      scales: { 
        y: { ticks: { color: '#ddd' }, title: { display: true, text: 'Anzahl Biere', color: '#aaa' } }, 
        x: { ticks: { color: '#ffd966', rotation: 45, maxRotation: 45 }, title: { display: true, text: 'Kalenderwoche', color: '#aaa' } }
      }
    }
  });
  
  const container = document.getElementById('weekStats');
  if (container) {
    container.innerHTML = weeks.map((week, idx) => `
      <div class="stat-card">
        <div class="stat-week"><strong>${week.label}</strong><br><span style="font-size:0.7rem;color:#aaa;">${week.range}</span></div>
        <div class="stat-count">${consumption[idx]}</div>
        <div class="stat-label">🍺 Biere</div>
      </div>
    `).join('');
  }
  
  // Ranking rendern
  const rankingContainer = document.getElementById('weeklyRanking');
  if (rankingContainer) {
    rankingContainer.innerHTML = weeks.map((week, idx) => {
      const personCounts = perPerson[idx];
      const ranking = Object.entries(personCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);
      const rankIcons = ['🥇', '🥈', '🥉'];
      const rankColors = ['rank-1', 'rank-2', 'rank-3'];
      
      let rankingHtml = `<div class="ranking-week">
        <div class="ranking-week-title">🏆 ${week.label} (${week.range})</div>
        <div class="ranking-list">`;
      
      if (ranking.length === 0) {
        rankingHtml += `<div style="text-align:center;padding:15px;color:#888;">🍺 Keine Biere in dieser Woche</div>`;
      } else {
        ranking.forEach(([name, count], rIdx) => {
          rankingHtml += `
            <div class="ranking-item">
              <div class="rank-number ${rankColors[rIdx]}">${rankIcons[rIdx]}</div>
              <div class="rank-name">${escapeHtml(name)}</div>
              <div class="rank-count">${count} 🍺</div>
            </div>
          `;
        });
      }
      rankingHtml += `</div></div>`;
      return rankingHtml;
    }).join('');
  }
}

function renderMonthlyChart(historyArray) {
  const months = new Map();
  if (historyArray) {
    historyArray.forEach(entry => {
      if (entry?.time) {
        const d = new Date(entry.time);
        if (!isNaN(d)) {
          const key = `${d.getMonth()+1}/${d.getFullYear()}`;
          months.set(key, (months.get(key) || 0) + 1);
        }
      }
    });
  }
  
  const sortedLabels = Array.from(months.keys()).sort((a,b) => {
    const [mA, yA] = a.split('/');
    const [mB, yB] = b.split('/');
    return (parseInt(yA) - parseInt(yB)) || (parseInt(mA) - parseInt(mB));
  });
  const chartData = sortedLabels.map(l => months.get(l) || 0);
  
  const ctx = document.getElementById('beerChart').getContext('2d');
  if (beerChart) beerChart.destroy();
  beerChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: sortedLabels, datasets: [{ label: '🍺 Biere/Monat', data: chartData, backgroundColor: '#f9b43a', borderRadius: 12 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#ddd' } }, x: { ticks: { color: '#ffd966' } } } }
  });
  
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  const targets = [
    { year: currentYear, month: currentMonth, id: "currentMonthCount", labelId: "currentMonthLabel" },
    { year: currentMonth === 1 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 12 : currentMonth - 1, id: "lastMonthCount", labelId: "lastMonthLabel" },
    { year: currentMonth <= 2 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 11 : (currentMonth === 2 ? 12 : currentMonth - 2), id: "twoMonthsAgoCount", labelId: "twoMonthsAgoLabel" }
  ];
  
  targets.forEach(t => {
    document.getElementById(t.labelId).innerText = new Date(t.year, t.month-1, 1).toLocaleString('de-DE', { month: 'long', year: 'numeric' });
  });
  
  const counts = [0,0,0];
  if (historyArray) {
    historyArray.forEach(entry => {
      if (entry?.time) {
        const date = new Date(entry.time);
        if (!isNaN(date)) {
          const y = date.getFullYear(), m = date.getMonth()+1;
          for (let i = 0; i < targets.length; i++) {
            if (y === targets[i].year && m === targets[i].month) { counts[i]++; break; }
          }
        }
      }
    });
  }
  targets.forEach((t, i) => document.getElementById(t.id).innerText = counts[i]);
}

function refreshUI(historyArray) {
  if (!historyArray) historyArray = [];
  updateTotalDisplay(historyArray);
  renderWeeklyChart(historyArray);
  renderMonthlyChart(historyArray);
}

function loadLocalData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : null;
}

async function initFirebase() {
  updateConnectionStatus('📡 Verbinde mit Firebase...');
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
    const { getFirestore, doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    mainDocRef = doc(db, "strichliste", "juii_main");
    const testSnap = await getDoc(mainDocRef);
    refreshUI(testSnap.exists() ? (testSnap.data().history || []) : []);
    updateConnectionStatus('✅ Firebase verbunden (Live-Synchronisation)');
    useFirebase = true;
    unsubscribe = onSnapshot(mainDocRef, (snapshot) => {
      if (snapshot.exists()) refreshUI(snapshot.data().history || []);
    });
  } catch (err) {
    console.error(err);
    updateConnectionStatus('⚠️ Firebase nicht erreichbar – Lokaler Speicher');
    const data = loadLocalData();
    refreshUI(data?.history || []);
    useFirebase = false;
  }
}

initFirebase();
</script>
</body>
</html>
