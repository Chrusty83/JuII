<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OGA Bierstatistik</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px 12px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f9b43a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .glass-card {
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 20px 0;
      border: 1px solid #2c2c3a;
    }
    
    .total-beer-badge {
      background: #2e7d64;
      color: white;
      padding: 8px 20px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .total-beer-alltime {
      background: #5a3e2b;
      color: #ffd966;
      padding: 8px 20px;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 15px;
      margin-left: 10px;
      font-weight: bold;
      font-size: 1.1rem;
    }
    
    .toast-popup {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2e7d64;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: bold;
      font-size: 1rem;
      z-index: 1002;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      animation: fadeInUp 0.3s ease-out;
      pointer-events: none;
      white-space: nowrap;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }
    
    footer {
      font-size: 11px;
      margin-top: 30px;
      opacity: 0.5;
      color: #888;
    }
    
    .stats-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #252536;
      border-radius: 20px;
      padding: 12px 18px;
      min-width: 120px;
      text-align: center;
      border: 1px solid #3a3a4a;
    }
    .stat-month, .stat-week {
      font-size: 0.9rem;
      font-weight: bold;
      color: #ffd966;
      margin-bottom: 6px;
    }
    .stat-count {
      font-size: 1.8rem;
      font-weight: bold;
      color: #f9b43a;
    }
    .stat-label {
      font-size: 0.7rem;
      color: #aaa;
      margin-top: 5px;
    }
    #weeklyChartContainer, #chartContainer {
      background: #1a1a28;
      border-radius: 28px;
      padding: 16px;
      margin: 28px 0;
    }
    canvas#weeklyChart, canvas#beerChart { 
      max-height: 320px; 
      width: 100% !important; 
    }
    h2 { margin: 1rem 0 0.75rem; color: #ffd966; }
    .badge-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .weeks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🍺 OGA BIERSTATISTIK 🍺</h1>

<div class="glass-card">
  <div class="badge-container">
    <div id="totalBeerDisplay" class="total-beer-badge">🍺 Aktueller Monat: 0 Biere</div>
    <div id="totalAllTimeDisplay" class="total-beer-alltime">📊 Alle Zeiten: 0 Biere</div>
  </div>
</div>

<!-- Wochenauswertung zuerst -->
<div id="weeklyChartContainer">
  <h2>📊 Bierkonsum pro Woche (letzte 8 Wochen)</h2>
  <canvas id="weeklyChart" width="800" height="350"></canvas>
  <div id="weekStats" class="weeks-grid">
    <!-- Hier werden dynamisch alle 8 Wochen als Karten angezeigt -->
  </div>
</div>

<!-- Monatsauswertung danach -->
<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
  
  <div id="monthStats" class="stats-container">
    <div class="stat-card">
      <div class="stat-month" id="currentMonthLabel">-</div>
      <div class="stat-count" id="currentMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="lastMonthLabel">-</div>
      <div class="stat-count" id="lastMonthCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
    <div class="stat-card">
      <div class="stat-month" id="twoMonthsAgoLabel">-</div>
      <div class="stat-count" id="twoMonthsAgoCount">0</div>
      <div class="stat-label">🍺 Biere</div>
    </div>
  </div>
</div>

<footer><span id="connectionStatus"></span></footer>

<script>
// ==================== KONFIGURATION ====================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6"
};

// ==================== GLOBALE VARIABLEN ====================
let useFirebase = false;
let mainDocRef = null;
let unsubscribe = null;
let beerChart = null;
let weeklyChart = null;

const STORAGE_KEY = "juii_bierdeckel_data";

// ==================== HILFSFUNKTIONEN ====================
function updateConnectionStatus(msg) {
  const div = document.getElementById('connectionStatus');
  if (div) div.innerHTML = msg;
}

// ==================== GESAMTANZEIGEN ====================
function getAllTimeBeerCount(historyArray) {
  if (!historyArray || !Array.isArray(historyArray)) return 0;
  return historyArray.length;
}

function getCurrentMonthCount(historyArray) {
  if (!historyArray || !Array.isArray(historyArray)) return 0;
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  
  let count = 0;
  historyArray.forEach(entry => {
    if (entry?.time) {
      const date = new Date(entry.time);
      if (!isNaN(date.getTime()) && 
          date.getFullYear() === currentYear && 
          date.getMonth() + 1 === currentMonth) {
        count++;
      }
    }
  });
  return count;
}

function updateTotalDisplay(historyArray) {
  const totalDiv = document.getElementById('totalBeerDisplay');
  const allTimeDiv = document.getElementById('totalAllTimeDisplay');
  
  if (totalDiv) {
    const currentMonthCount = getCurrentMonthCount(historyArray);
    totalDiv.innerHTML = `🍺 Aktueller Monat: ${currentMonthCount} ${currentMonthCount === 1 ? 'Bier' : 'Biere'}`;
  }
  
  if (allTimeDiv) {
    const allTime = getAllTimeBeerCount(historyArray);
    allTimeDiv.innerHTML = `📊 Alle Zeiten: ${allTime} ${allTime === 1 ? 'Bier' : 'Biere'}`;
  }
}

// ==================== TOAST-NACHRICHT ====================
function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = 'toast-popup';
  toast.style.background = isError ? '#c44536' : '#2e7d64';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}

// ==================== HELFER FÜR DATUM ====================
function getWeekNumber(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return { year: d.getUTCFullYear(), week: weekNo };
}

function getWeekRange(year, week) {
  const simple = new Date(year, 0, 1 + (week - 1) * 7);
  const dayOfWeek = simple.getDay();
  const monday = new Date(simple);
  if (dayOfWeek <= 1) {
    monday.setDate(simple.getDate() - dayOfWeek + 1);
  } else {
    monday.setDate(simple.getDate() + 8 - dayOfWeek);
  }
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const formatDate = (d) => `${d.getDate()}.${d.getMonth()+1}`;
  return `${formatDate(monday)} - ${formatDate(sunday)}`;
}

// ==================== MONATSÜBERSICHT ====================
function getMonthName(year, month) {
  return new Date(year, month - 1, 1).toLocaleString('de-DE', { month: 'long', year: 'numeric' });
}

function updateMonthStats(historyArray) {
  const now = new Date();
  const currentYear = now.getFullYear();
  const currentMonth = now.getMonth() + 1;
  
  const targets = [
    { year: currentYear, month: currentMonth, elementId: "currentMonthCount", labelId: "currentMonthLabel" },
    { year: currentMonth === 1 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 12 : currentMonth - 1, elementId: "lastMonthCount", labelId: "lastMonthLabel" },
    { year: currentMonth <= 2 ? currentYear - 1 : currentYear, month: currentMonth === 1 ? 11 : (currentMonth === 2 ? 12 : currentMonth - 2), elementId: "twoMonthsAgoCount", labelId: "twoMonthsAgoLabel" }
  ];
  
  targets.forEach(t => {
    const el = document.getElementById(t.labelId);
    if (el) el.innerText = getMonthName(t.year, t.month);
  });
  
  const counts = [0, 0, 0];
  if (historyArray && Array.isArray(historyArray)) {
    historyArray.forEach(entry => {
      if (entry?.time) {
        const date = new Date(entry.time);
        if (!isNaN(date.getTime())) {
          const entryYear = date.getFullYear();
          const entryMonth = date.getMonth() + 1;
          for (let i = 0; i < targets.length; i++) {
            if (entryYear === targets[i].year && entryMonth === targets[i].month) {
              counts[i]++;
              break;
            }
          }
        }
      }
    });
  }
  
  document.getElementById('currentMonthCount').innerText = counts[0];
  document.getElementById('lastMonthCount').innerText = counts[1];
  document.getElementById('twoMonthsAgoCount').innerText = counts[2];
}

// ==================== WOCHENÜBERSICHT (letzte 8 Wochen) ====================
function getLast8Weeks() {
  const weeks = [];
  const now = new Date();
  
  for (let i = 7; i >= 0; i--) {
    const date = new Date(now);
    date.setDate(now.getDate() - (i * 7));
    const { year, week } = getWeekNumber(date);
    weeks.push({ year, week, label: `KW${week}`, range: getWeekRange(year, week) });
  }
  return weeks;
}

function getWeeklyConsumption(historyArray, weeks) {
  const consumption = new Array(weeks.length).fill(0);
  
  if (!historyArray || !Array.isArray(historyArray)) return consumption;
  
  historyArray.forEach(entry => {
    if (entry?.time) {
      const date = new Date(entry.time);
      if (!isNaN(date.getTime())) {
        const { year, week } = getWeekNumber(date);
        
        for (let i = 0; i < weeks.length; i++) {
          if (weeks[i].year === year && weeks[i].week === week) {
            consumption[i]++;
            break;
          }
        }
      }
    }
  });
  
  return consumption;
}

function renderWeeklyChart(historyArray) {
  const weeks = getLast8Weeks();
  const weeklyData = getWeeklyConsumption(historyArray, weeks);
  
  const ctx = document.getElementById('weeklyChart').getContext('2d');
  if (weeklyChart) weeklyChart.destroy();
  
  weeklyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weeks.map(w => w.label),
      datasets: [{
        label: '🍺 Biere pro Woche',
        data: weeklyData,
        backgroundColor: '#5a9e4e',
        borderRadius: 10
      }]
    },
    options: {
      responsive: true,
      plugins: { 
        legend: { labels: { color: '#fff' } },
        tooltip: {
          callbacks: {
            afterLabel: (context) => {
              const week = weeks[context.dataIndex];
              return `📅 ${week.range}`;
            }
          }
        }
      },
      scales: { 
        y: { 
          ticks: { color: '#ddd' },
          title: { display: true, text: 'Anzahl Biere', color: '#aaa' }
        }, 
        x: { 
          ticks: { color: '#ffd966', rotation: 45, maxRotation: 45 },
          title: { display: true, text: 'Kalenderwoche', color: '#aaa' }
        } 
      }
    }
  });
  
  // Zeige alle 8 Wochen als Karten an
  const weekStatsContainer = document.getElementById('weekStats');
  if (weekStatsContainer) {
    weekStatsContainer.innerHTML = '';
    
    weeks.forEach((week, idx) => {
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.style.minWidth = '110px';
      card.innerHTML = `
        <div class="stat-week"><strong>${week.label}</strong><br><span style="font-size: 0.7rem; color: #aaa;">${week.range.split(' - ')[0]} bis ${week.range.split(' - ')[1]}</span></div>
        <div class="stat-count">${weeklyData[idx]}</div>
        <div class="stat-label">🍺 Biere</div>
      `;
      weekStatsContainer.appendChild(card);
    });
  }
}

// ==================== MONATS-CHART RENDERN ====================
function renderMonthlyChart(historyArray) {
  const months = new Map();
  if (historyArray && Array.isArray(historyArray)) {
    historyArray.forEach(e => {
      if (e?.time) {
        const d = new Date(e.time);
        if (!isNaN(d)) {
          const key = `${d.getMonth()+1}/${d.getFullYear()}`;
          months.set(key, (months.get(key) || 0) + 1);
        }
      }
    });
  }
  
  const sortedLabels = Array.from(months.keys()).sort((a,b) => {
    const [mA, yA] = a.split('/');
    const [mB, yB] = b.split('/');
    return (parseInt(yA) - parseInt(yB)) || (parseInt(mA) - parseInt(mB));
  });
  const chartData = sortedLabels.map(l => months.get(l) || 0);
  
  const ctx = document.getElementById('beerChart').getContext('2d');
  if (beerChart) beerChart.destroy();
  beerChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sortedLabels,
      datasets: [{
        label: '🍺 Biere/Monat',
        data: chartData,
        backgroundColor: '#f9b43a',
        borderRadius: 12
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#fff' } } },
      scales: { y: { ticks: { color: '#ddd' } }, x: { ticks: { color: '#ffd966' } } }
    }
  });
  
  updateMonthStats(historyArray);
}

// ==================== UI AKTUALISIEREN ====================
function refreshUI(historyArray) {
  if (!historyArray) historyArray = [];
  updateTotalDisplay(historyArray);
  renderWeeklyChart(historyArray);   // Wochen zuerst
  renderMonthlyChart(historyArray);  // Monate danach
}

// ==================== LOCALSTORAGE FUNKTIONEN ====================
function loadLocalData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : null;
}

function saveLocalData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ==================== FIREBASE INITIALISIERUNG ====================
async function initFirebase() {
  updateConnectionStatus('📡 Verbinde mit Firebase...');
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
    const { getFirestore, doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const app = initializeApp(FIREBASE_CONFIG);
    const db = getFirestore(app);
    mainDocRef = doc(db, "strichliste", "juii_main");
    const testSnap = await getDoc(mainDocRef);
    if (!testSnap.exists()) {
      const emptyHistory = [];
      refreshUI(emptyHistory);
    } else {
      const data = testSnap.data();
      const history = data.history || [];
      refreshUI(history);
    }
    updateConnectionStatus('✅ Firebase verbunden (Live-Synchronisation)');
    useFirebase = true;
    unsubscribe = onSnapshot(mainDocRef, (snapshot) => {
      if (snapshot.exists()) {
        const snapData = snapshot.data();
        const history = snapData.history || [];
        refreshUI(history);
      }
    });
    return true;
  } catch (err) {
    console.error("Firebase Fehler:", err);
    updateConnectionStatus('⚠️ Firebase nicht erreichbar – Verwende lokalen Speicher');
    renderLocalData();
    useFirebase = false;
    return false;
  }
}

// ==================== LOKALEN SPEICHER INITIALISIEREN ====================
function renderLocalData() {
  let data = loadLocalData();
  let history = [];
  if (data && data.history) {
    history = data.history;
  } else if (data && data.beers !== undefined) {
    // Altes Format ohne History
    history = [];
  } else {
    history = [];
  }
  refreshUI(history);
  updateConnectionStatus('💾 Lokaler Speicher (Offline-Modus)');
}

// ==================== START ====================
async function start() {
  await initFirebase();
}

start();
</script>
</body>
</html>
