<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierdeckel</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    h1 { font-size: 32px; }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 95%;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
      font-size: 14px;
      vertical-align: top;
    }

    th { background-color: #222; }

    canvas {
      background: #fff;
      border-radius: 8px;
      width: 120px !important;
      height: 120px !important;
    }

    .beers { font-size: 22px; }
    .price { font-size: 12px; color: #aaa; }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      margin: 2px;
    }

    .add { background: #0a84ff; }
    .pay { background: #00c853; }

    #message {
      margin: 15px;
      font-size: 18px;
      color: #0f0;
    }

    #chartContainer {
      width: 95%;
      margin: 30px auto;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    /* 💰 Popup */
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
    }

    #popupBox {
      background: #222;
      padding: 25px;
      border-radius: 12px;
      transition: transform 0.2s ease;
    }

    /* 🍺 Bezahlt Animation */
    .paid {
      transform: scale(1.15);
      background: #00c853 !important;
    }

    .fadeOut {
      animation: fadeOut 0.4s ease forwards;
    }

    @keyframes fadeOut {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.7); }
    }
  </style>
</head>

<body>

<h1>🍺 JUII Bierdeckel 🍺</h1>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Biere</th>
      <th>Aktion</th>
      <th>QR</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<div id="chartContainer">
  <h2>Monatsübersicht</h2>
  <canvas id="beerChart"></canvas>
</div>

<!-- 💰 Popup -->
<div id="popup">
  <div id="popupBox">
    <h2 id="popupName"></h2>
    <p id="popupSum"></p>
    <button id="payBtn" onclick="confirmPay()" class="pay">Zahlen</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

const names = [
  "Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris",
  "Clemens","Dietmar","Donde","Jakob","Lukas","Max",
  "Micha","Hainzl","Philipp","Basti B.","Simon",
  "Schwob","Tim","Timo","Tom"
];

const price = 2;

let last = {};
let currentPerson = null;

/* safe id */
function safeId(n){
  return n.replace(/[^a-zA-Z0-9]/g,"");
}

/* LIVE */
function listen(){
  onSnapshot(ref, snap=>{
    const d = snap.exists() ? snap.data() : { history: [] };

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    names.forEach(n=>{
      const c = d[n] || 0;
      const id = safeId(n);

      tbody.innerHTML += `
        <tr>
          <td>${n}</td>
          <td>${"🍺".repeat(c)}<br><small>${c * price} €</small></td>
          <td>
            <button class="add" onclick="add('${n}')">+1</button>
            <button class="pay" onclick="pay('${n}')">Zahlen</button>
          </td>
          <td><canvas id="qr-${id}"></canvas></td>
        </tr>
      `;
    });

    renderQRs();
  });
}

/* ADD */
window.add = async function(name){
  const snap = await getDoc(ref);
  const d = snap.data() || { history: [] };

  d[name] = (d[name] || 0) + 1;

  await setDoc(ref, d);
};

/* PAY */
window.pay = function(name){
  currentPerson = name;

  const snap = getDoc(ref);
  snap.then(s=>{
    const d = s.data();
    const count = d[name] || 0;

    document.getElementById("popupName").innerText = name;
    document.getElementById("popupSum").innerText = `Zu zahlen: ${count * price} €`;

    document.getElementById("popup").style.display = "flex";
  });
};

/* 💥 CONFIRM PAY + ANIMATION */
window.confirmPay = async function(){
  const snap = await getDoc(ref);
  const d = snap.data();

  if(currentPerson){
    d[currentPerson] = 0;
    await setDoc(ref, d);
  }

  /* Animation */
  const box = document.getElementById("popupBox");
  const btn = document.getElementById("payBtn");

  box.classList.add("paid");
  btn.innerText = "✓ Bezahlt";

  setTimeout(()=>{
    document.getElementById("popup").style.display = "none";
    box.classList.remove("paid");
    btn.innerText = "Zahlen";
  }, 600);
};

/* QR */
function renderQRs(){
  const base = window.location.origin + window.location.pathname;

  names.forEach(n=>{
    const id = safeId(n);
    const canvas = document.getElementById("qr-"+id);

    if(canvas){
      QRCode.toCanvas(canvas, base+"?add="+encodeURIComponent(n), {
        width: 120
      });
    }
  });
}

/* SCAN */
const params = new URLSearchParams(window.location.search);
const u = params.get("add");

if(u && names.includes(u)){
  add(u);
  document.getElementById("message").innerText = `🍺 1 Bier für ${u}`;
  window.history.replaceState({}, "", window.location.pathname);
}

listen();
</script>

</body>
</html>
