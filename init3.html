<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Bierdeckel</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background:#111;
      color:#fff;
      font-family:Arial;
      text-align:center;
    }

    h1 { font-size:32px; }

    table {
      margin:20px auto;
      border-collapse:collapse;
      width:95%;
    }

    th, td {
      border:1px solid #444;
      padding:10px;
      font-size:14px;
      vertical-align:top;
    }

    th { background:#222; }

    canvas {
      background:#fff;
      border-radius:8px;
      width:120px !important;
      height:120px !important;
    }

    #chartContainer {
      width:95%;
      margin:30px auto;
      background:#1a1a1a;
      padding:15px;
      border-radius:10px;
    }

    button {
      padding:10px 14px;
      border:none;
      border-radius:6px;
      color:#fff;
      cursor:pointer;
      margin:2px;
    }

    .add { background:#0a84ff; }
    .pay { background:#00c853; }
    .cancel { background:#777; }

    #popup {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.85);
      align-items:center;
      justify-content:center;
    }

    #popupBox {
      background:#222;
      padding:20px;
      border-radius:10px;
    }

    #adminActions {
      display:none;
      margin-top:15px;
    }

    input {
      padding:8px;
      border-radius:5px;
      border:none;
    }
  </style>
</head>

<body>

<h1>🍺 JUII Bierdeckel 🍺</h1>

<!-- 🍺 TABLE -->
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Biere</th>
      <th>Aktion</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- 📊 DIAGRAMM (NEU) -->
<div id="chartContainer">
  <h2>📊 Bier pro Monat</h2>
  <canvas id="beerChart"></canvas>
</div>

<!-- 📱 QR TABLE -->
<h2>QR Codes</h2>
<table>
  <tbody id="qrBody"></tbody>
</table>

<!-- 🔐 ADMIN -->
<h2>Admin</h2>

<input type="password" id="password">
<button onclick="login()" class="add">Login</button>

<div id="adminActions">
  <button onclick="resetAll()" style="background:red;">Alles löschen</button>
  <button onclick="clearHistory()" style="background:orange;">Verlauf löschen</button>

  <h3>Verlauf</h3>
  <ul id="history"></ul>
</div>

<!-- 💰 POPUP -->
<div id="popup">
  <div id="popupBox">
    <h3 id="popupName"></h3>
    <p id="popupSum"></p>

    <button class="pay" onclick="confirmPay()">Zahlen</button>
    <button class="cancel" onclick="closePopup()">Abbrechen</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

const names = [
  "Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris",
  "Clemens","Dietmar","Donde","Jakob","Lukas","Max",
  "Micha","Hainzl","Philipp","Basti B.","Simon",
  "Schwob","Tim","Timo","Tom"
];

const price = 2;

let chart;
let currentPerson = null;

/* SAFE */
function safeId(n){
  return n.replace(/[^a-zA-Z0-9]/g,"");
}

/* 🍺 CHART (MONAT) */
function renderChart(history){
  const months = {};

  (history || []).forEach(e=>{
    const d = new Date(e.time);
    const key = `${d.getMonth()+1}/${d.getFullYear()}`;
    months[key] = (months[key] || 0) + 1;
  });

  const ctx = document.getElementById("beerChart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(months),
      datasets: [{
        label: "Biere pro Monat",
        data: Object.values(months),
        backgroundColor: "#00c853"
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: "#fff" } }
      },
      scales: {
        x: { ticks: { color:"#fff" } },
        y: { ticks: { color:"#fff" } }
      }
    }
  });
}

/* LIVE */
function listen(){
  onSnapshot(ref, snap=>{
    const d = snap.exists() ? snap.data() : { history: [] };

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    names.forEach(n=>{
      const c = d[n] || 0;

      tbody.innerHTML += `
        <tr>
          <td>${n}</td>
          <td>${"🍺".repeat(c)}<br>${c * price} €</td>
          <td>
            <button class="add" onclick="add('${n}')">+1</button>
            <button class="pay" onclick="pay('${n}')">Zahlen</button>
          </td>
        </tr>
      `;
    });

    renderHistory(d.history || []);
    renderQRs();
    renderChart(d.history || []);
  });
}

/* ADD */
window.add = async function(name){
  const snap = await getDoc(ref);
  const d = snap.data() || { history: [] };

  d[name] = (d[name] || 0) + 1;

  d.history.push({
    name,
    time: new Date().toISOString()
  });

  await setDoc(ref, d);
};

/* PAY */
window.pay = function(name){
  currentPerson = name;

  getDoc(ref).then(snap=>{
    const d = snap.data();
    const c = d[name] || 0;

    document.getElementById("popupName").innerText = name;
    document.getElementById("popupSum").innerText =
      `Zu zahlen: ${c * price} €`;

    document.getElementById("popup").style.display = "flex";
  });
};

/* CONFIRM */
window.confirmPay = async function(){
  const snap = await getDoc(ref);
  const d = snap.data();

  if(currentPerson){
    d[currentPerson] = 0;
    await setDoc(ref, d);
  }

  document.getElementById("popup").style.display = "none";
};

/* CLOSE */
window.closePopup = function(){
  document.getElementById("popup").style.display = "none";
};

/* QR */
function renderQRs(){
  const base = window.location.origin + window.location.pathname;

  const qrBody = document.getElementById("qrBody");
  qrBody.innerHTML = "";

  names.forEach(n=>{
    const id = safeId(n);

    qrBody.innerHTML += `
      <tr>
        <td>${n}</td>
        <td><canvas id="qr-${id}"></canvas></td>
      </tr>
    `;
  });

  setTimeout(()=>{
    names.forEach(n=>{
      const id = safeId(n);
      const canvas = document.getElementById("qr-"+id);

      if(canvas){
        QRCode.toCanvas(canvas, base+"?add="+encodeURIComponent(n), {
          width:120
        });
      }
    });
  },200);
}

/* ADMIN */
window.login = function(){
  if(document.getElementById("password").value === "admin"){
    document.getElementById("adminActions").style.display = "block";
  }
};

window.resetAll = async function(){
  await setDoc(ref, { history: [] });
};

window.clearHistory = async function(){
  const snap = await getDoc(ref);
  const d = snap.data();
  d.history = [];
  await setDoc(ref, d);
};

/* HISTORY */
function renderHistory(h){
  const ul = document.getElementById("history");
  ul.innerHTML = "";

  (h || []).slice().reverse().forEach(e=>{
    const li = document.createElement("li");
    li.innerText = `${e.name} → ${e.time}`;
    ul.appendChild(li);
  });
}

/* SCAN */
const params = new URLSearchParams(window.location.search);
const u = params.get("add");

if(u && names.includes(u)){
  add(u);
  window.history.replaceState({}, "", window.location.pathname);
}

listen();
</script>

</body>
</html>
