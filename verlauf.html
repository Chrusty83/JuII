<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JUII Verlauf</title>

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    table {
      width: 95%;
      margin: auto;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
      font-size: 14px;
    }

    th {
      background: #111;
    }

    tr:nth-child(even) {
      background: #111;
    }

    .time {
      color: #aaa;
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>📜 JUII Bier Verlauf</h1>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Datum & Zeit</th>
    </tr>
  </thead>
  <tbody id="historyTable"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔴 DEINE FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ref = doc(db, "strichliste", "main");

/* 🕒 DATUM FORMAT */
function formatDate(iso){
  const d = new Date(iso);

  return d.toLocaleString("de-DE", {
    day: "2-digit",
    month: "2-digit",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

/* 🔄 LIVE VERLAUF */
onSnapshot(ref, snap=>{
  const data = snap.exists() ? snap.data() : { history: [] };

  const history = data.history || [];

  const table = document.getElementById("historyTable");
  table.innerHTML = "";

  if(history.length === 0){
    table.innerHTML = `<tr><td colspan="2">Keine Einträge vorhanden</td></tr>`;
    return;
  }

  history
    .slice()
    .reverse()
    .forEach(entry=>{
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${entry.name}</td>
        <td class="time">${formatDate(entry.time)}</td>
      `;

      table.appendChild(tr);
    });
});
</script>

</body>
</html>
