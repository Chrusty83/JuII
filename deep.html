<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JUII Bierdeckel – Strichliste</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;}body{background:#111;color:#f0f0f0;font-family:'Segoe UI',Roboto,sans-serif;margin:0;padding:20px 12px 40px;text-align:center;}
    h1{font-size:2rem;background:linear-gradient(135deg,#f9b43a,#ffd966);background-clip:text;-webkit-background-clip:text;color:transparent;}
    h2,h3{margin:1rem 0 0.75rem;color:#ffd966;}
    .glass-card{background:rgba(30,30,40,0.85);backdrop-filter:blur(2px);border-radius:28px;padding:16px 12px;margin:20px 0;border:1px solid #2c2c3a;}
    table{margin:16px auto;border-collapse:collapse;width:100%;max-width:1300px;background:#1e1e2a;border-radius:24px;overflow:hidden;}
    th,td{border-bottom:1px solid #2e2e3e;padding:12px 8px;font-size:14px;vertical-align:middle;}
    th{background:#252536;color:#ffda88;}
    .beer-icons{font-size:1.4rem;letter-spacing:2px;}
    .beer-cost{font-size:13px;color:#aaa;margin-top:4px;}
    button,.add,.remove,.pay,.admin-login-btn,.reset-btn,.clear-btn,.logout-btn,.popup-confirm,.popup-cancel{padding:8px 16px;border:none;border-radius:40px;font-weight:bold;font-size:0.85rem;cursor:pointer;margin:4px 6px;transition:transform 0.1s,opacity 0.2s;}
    button:active{transform:scale(0.96);}button:hover{opacity:0.85;}
    .add{background:#0a84ff;color:white;}.remove{background:#ff6b35;color:white;}.pay{background:#2e7d64;color:white;}
    .admin-login-btn{background:#5a5fcf;color:white;}.reset-btn{background:#c44536;color:white;}.clear-btn{background:#e68a2e;color:white;}
    .logout-btn{background:#666;color:white;}.popup-confirm{background:#2e7d64;color:white;}.popup-cancel{background:#6c757d;color:white;}
    .action-buttons{display:flex;flex-direction:column;gap:6px;align-items:center;}
    #chartContainer{background:#1a1a28;border-radius:28px;padding:16px;margin:28px 0;}
    canvas#beerChart{max-height:320px;width:100%;}canvas#weeklyChart{max-height:300px;width:100%;margin-top:20px;}
    .stats-container{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap;}
    .stat-card{background:#252536;border-radius:20px;padding:15px 25px;min-width:140px;text-align:center;border:1px solid #3a3a4a;}
    .stat-month{font-size:1.2rem;font-weight:bold;color:#ffd966;margin-bottom:8px;}
    .stat-count{font-size:2.2rem;font-weight:bold;color:#f9b43a;}.stat-label{font-size:0.8rem;color:#aaa;margin-top:5px;}
    input[type="password"]{background:#2a2a36;border:1px solid #444;padding:10px 14px;border-radius:40px;color:white;font-size:1rem;width:220px;}
    .history-list{background:#0f0f17;border-radius:28px;padding:12px 18px;max-height:240px;overflow-y:auto;text-align:left;}
    footer{font-size:11px;margin-top:30px;opacity:0.5;color:#888;}
    .loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:#ffd966;animation:spin 0.8s linear infinite;margin-left:10px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .confirm-popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);align-items:center;justify-content:center;z-index:1001;}
    .confirm-popup-box{background:#1f1f2c;padding:28px 24px;border-radius:48px;min-width:320px;text-align:center;border:1px solid #ffd966;}
    .confirm-popup-box p{font-size:1.2rem;margin-bottom:10px;}
    .confirm-amount{font-size:1.8rem;font-weight:bold;color:#b9f6ca;margin:15px 0;}
    .confirm-buttons{display:flex;gap:15px;justify-content:center;margin-top:20px;}
    .total-beer-badge{background:#2e7d64;color:white;padding:8px 20px;border-radius:60px;display:inline-block;margin-bottom:15px;font-weight:bold;font-size:1.1rem;}
    .toast-popup{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#2e7d64;color:white;padding:12px 24px;border-radius:60px;font-weight:bold;font-size:1rem;z-index:1002;box-shadow:0 4px 15px rgba(0,0,0,0.3);animation:fadeInUp 0.3s ease-out;pointer-events:none;white-space:nowrap;}
    @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    .section-title{margin-top:25px;margin-bottom:15px;font-size:1.3rem;}
  </style>
</head>
<body>
<h1>🍺 JUII BIERDECKEL 🍺</h1>
<div class="glass-card">
  <div id="totalBeerDisplay" class="total-beer-badge">🍺 Gesamt: 0 Biere</div>
  <div style="overflow-x:auto;"><table><thead><tr><th>Name</th><th>🍺 Anzahl / Kosten</th><th>Aktionen</th></tr></thead><tbody id="tableBody"><tr><td colspan="3">📡 Lade Daten... <span class="loading-spinner"></span></td></tr></tbody></table></div>
</div>
<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
  <div id="monthStats" class="stats-container">
    <div class="stat-card"><div class="stat-month" id="currentMonthLabel">-</div><div class="stat-count" id="currentMonthCount">0</div><div class="stat-label">🍺 Biere</div></div>
    <div class="stat-card"><div class="stat-month" id="lastMonthLabel">-</div><div class="stat-count" id="lastMonthCount">0</div><div class="stat-label">🍺 Biere</div></div>
    <div class="stat-card"><div class="stat-month" id="twoMonthsAgoLabel">-</div><div class="stat-count" id="twoMonthsAgoCount">0</div><div class="stat-label">🍺 Biere</div></div>
  </div>
  <h2 class="section-title">📊 Bierkonsum pro Woche (letzte 8 Wochen)</h2>
  <canvas id="weeklyChart" width="800" height="300"></canvas>
</div>
<div class="glass-card">
  <h2>🔐 Admin Bereich</h2>
  <div><input type="password" id="adminPassword" placeholder="Passwort eingeben" autocomplete="off"><button id="loginBtn" class="admin-login-btn">🔓 Login</button></div>
  <div id="adminActions" style="display:none; margin-top:20px;">
    <button id="resetAllBtn" class="reset-btn">🧹 Alle Biere zurücksetzen</button>
    <button id="clearHistoryBtn" class="clear-btn">🗑️ Verlauf löschen</button>
    <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    <h3>📜 Letzte Aktionen</h3>
    <div class="history-list"><ul id="history"></ul></div>
  </div>
</div>
<div id="confirmPopup" class="confirm-popup"><div class="confirm-popup-box"><p>🍺 <strong id="confirmName"></strong>, hast du bezahlt?</p><div class="confirm-amount" id="confirmAmount"></div><div class="confirm-buttons"><button id="confirmYesBtn" class="popup-confirm">✅ Ja, bezahlt</button><button id="confirmNoBtn" class="popup-cancel">❌ Nein, abbrechen</button></div></div></div>
<footer><span id="connectionStatus"></span></footer>
<script>
const BEER_PRICE=2,FIREBASE_CONFIG={apiKey:"AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",authDomain:"juii-strichliste.firebaseapp.com",projectId:"juii-strichliste",storageBucket:"juii-strichliste.firebasestorage.app",messagingSenderId:"8081599971",appId:"1:8081599971:web:6cc277281b040d995304d6"},ADMIN_PASSWORD="admin123";
let isAdminLoggedIn=false,useFirebase=false,mainDocRef=null,unsubscribe=null,beerChart=null,weeklyChart=null,pendingPayPerson=null,pendingPayAmount=0;
const names=["Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris","Clemens","Dietmar","Donde","Jakob","Lukas","Max","Micha","Hainzl","Philipp","Basti B.","Simon","Schwob","Tim","Timo","Tom"],STORAGE_KEY="juii_bierdeckel_data";
const escapeHtml=s=>s.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
const formatEuro=a=>a===Math.floor(a)?`${Math.floor(a)} €`:`${a.toFixed(2)} €`;
const updateConnectionStatus=msg=>{const d=document.getElementById('connectionStatus');if(d)d.innerHTML=msg;};
const getTotalBeerCount=d=>{if(!d)return 0;let t=0;names.forEach(n=>t+=d[n]||0);return t;};
const updateTotalDisplay=d=>{const td=document.getElementById('totalBeerDisplay');if(td){const t=getTotalBeerCount(d);td.innerHTML=`🍺 Gesamt: ${t} ${t===1?'Bier':'Biere'}`;}};
const showToast=(msg,isErr)=>{const t=document.createElement('div');t.className='toast-popup';t.style.background=isErr?'#c44536':'#2e7d64';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2500);};
const closeConfirmPopup=()=>{document.getElementById('confirmPopup').style.display='none';pendingPayPerson=null;};
const resetBeerCountForPerson=async p=>{if(!p)return;if(useFirebase&&mainDocRef){const{getDoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),snap=await getDoc(mainDocRef);if(snap.exists()){let c=snap.data();c[p]=0;c.history=[...(c.history||[]),{name:`${p} (bezahlt: ${c[p]||0} Bier)`,time:new Date().toISOString()}];await setDoc(mainDocRef,c);}}else{let d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"history":[]}');names.forEach(n=>{if(typeof d[n]!=='number')d[n]=0;});d[p]=0;if(!d.history)d.history=[];d.history.push({name:`${p} (bezahlt)`,time:new Date().toISOString()});localStorage.setItem(STORAGE_KEY,JSON.stringify(d));refreshUI();}closeConfirmPopup();};
const removeBeerFromPerson=async p=>{if(!isAdminLoggedIn){showToast("Keine Berechtigung! Nur für Admin.",true);return;}
  if(useFirebase&&mainDocRef){const{getDoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),snap=await getDoc(mainDocRef);if(snap.exists()){let c=snap.data();if(c[p]>0){c[p]--;c.history=[...(c.history||[]),{name:`${p} (1 Bier entfernt)`,time:new Date().toISOString()}];await setDoc(mainDocRef,c);showToast(`🍺 Ein Bier von ${p} wurde entfernt! (Neuer Stand: ${c[p]} Bier)`);}else showToast(`${p} hat keine Biere.`,true);}}
  else{let d=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"history":[]}');names.forEach(n=>{if(typeof d[n]!=='number')d[n]=0;});if(d[p]>0){d[p]--;if(!d.history)d.history=[];d.history.push({name:`${p} (1 Bier entfernt)`,time:new Date().toISOString()});localStorage.setItem(STORAGE_KEY,JSON.stringify(d));refreshUI();showToast(`🍺 Ein Bier von ${p} wurde entfernt! (Neuer Stand: ${d[p]} Bier)`);}else showToast(`${p} hat keine Biere.`,true);}};
const getMonthName=(y,m)=>new Date(y,m-1,1).toLocaleString('de-DE',{month:'long',year:'numeric'});
const renderMainTable=d=>{const tb=document.getElementById('tableBody');if(!tb)return;tb.innerHTML='';updateTotalDisplay(d);
  names.forEach(n=>{const c=d[n]||0,total=c*BEER_PRICE,icons=c>0?"🍺".repeat(Math.min(c,20))+(c>20?` +${c-20}`:""):"—";let btns=`<button class="add" data-name="${escapeHtml(n)}">+1 Bier</button><button class="pay" data-name-pay="${escapeHtml(n)}" data-count="${c}">bezahlt</button>`;if(isAdminLoggedIn)btns+=`<button class="remove" data-name-remove="${escapeHtml(n)}">-1 Bier</button>`;
    tb.innerHTML+=`<tr><td style="font-weight:500;">${escapeHtml(n)}</td><td class="beer-icons">${icons}<br><span class="beer-cost">${formatEuro(total)}</span></td><td><div class="action-buttons">${btns}</div></td></tr>`;});
  document.querySelectorAll('.add').forEach(btn=>{btn.onclick=()=>addBeer(btn.dataset.name);});
  document.querySelectorAll('.pay').forEach(btn=>{btn.onclick=()=>{const name=btn.dataset.namePay,count=parseInt(btn.dataset.count)||0;if(count===0)alert("Keine offenen Biere.");else{pendingPayPerson=name;pendingPayAmount=count*BEER_PRICE;document.getElementById('confirmName').innerText=name;document.getElementById('confirmAmount').innerHTML=`${count} 🍺 = ${formatEuro(pendingPayAmount)}`;document.getElementById('confirmPopup').style.display='flex';}};});});
  document.querySelectorAll('.remove').forEach(btn=>{btn.onclick=()=>removeBeerFromPerson(btn.dataset.nameRemove);});};
const updateWeeklyStats=history=>{const weeks=[],weekData=[],now=new Date();
  for(let i=7;i>=0;i--){const ws=new Date(now);ws.setDate(now.getDate()-(now.getDay()+7*i));ws.setHours(0,0,0,0);const we=new Date(ws);we.setDate(ws.getDate()+6);weeks.push(`${ws.getDate()}.${ws.getMonth()+1}. - ${we.getDate()}.${we.getMonth()+1}.`);weekData.push(0);}
  if(history&&Array.isArray(history))history.forEach(e=>{if(e?.time&&e.name&&!e.name.includes("bezahlt")&&!e.name.includes("entfernt")){const ed=new Date(e.time);if(!isNaN(ed))for(let i=0;i<8;i++){const ws=new Date(now);ws.setDate(now.getDate()-(now.getDay()+7*(7-i)));ws.setHours(0,0,0,0);const we=new Date(ws);we.setDate(ws.getDate()+6);we.setHours(23,59,59,999);if(ed>=ws&&ed<=we){weekData[i]++;break;}}}});
  const ctx=document.getElementById('weeklyChart').getContext('2d');if(weeklyChart)weeklyChart.destroy();
  weeklyChart=new Chart(ctx,{type:'bar',data:{labels:weeks,datasets:[{label:'🍺 Biere pro Woche',data:weekData,backgroundColor:'#f9b43a',borderRadius:8}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{y:{ticks:{color:'#ddd',stepSize:1},grid:{color:'#333'}},x:{ticks:{color:'#ffd966',maxRotation:45,minRotation:45},grid:{display:false}}}}});};
const renderMonthlyChart=history=>{const months=new Map();if(history&&Array.isArray(history))history.forEach(e=>{if(e?.time&&e.name&&!e.name.includes("bezahlt")&&!e.name.includes("entfernt")){const d=new Date(e.time);if(!isNaN(d)){const k=`${d.getMonth()+1}/${d.getFullYear()}`;months.set(k,(months.get(k)||0)+1);}}});
  const labels=Array.from(months.keys()).sort((a,b)=>{const[mA,yA]=a.split('/'),[mB,yB]=b.split('/');return(parseInt(yA)-parseInt(yB))||(parseInt(mA)-parseInt(mB));}),data=labels.map(l=>months.get(l)||0);
  const ctx=document.getElementById('beerChart').getContext('2d');if(beerChart)beerChart.destroy();
  beerChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{label:'🍺 Biere/Monat',data,backgroundColor:'#f9b43a',borderRadius:12}]},options:{responsive:true,plugins:{legend:{labels:{color:'#fff'}}},scales:{y:{ticks:{color:'#ddd'}},x:{ticks:{color:'#ffd966'}}}}});
  const realHistory=(history||[]).filter(e=>e&&e.name&&!e.name.includes("bezahlt")&&!e.name.includes("entfernt"));
  const now=new Date(),cy=now.getFullYear(),cm=now.getMonth()+1;[[cy,cm],[cm===1?cy-1:cy,cm===1?12:cm-1],[cm<=2?cy-1:cy,cm===1?11:(cm===2?12:cm-2)]].forEach(([y,m],i)=>{document.getElementById(i===0?'currentMonthLabel':i===1?'lastMonthLabel':'twoMonthsAgoLabel').innerText=getMonthName(y,m);});
  const cnt=[0,0,0];realHistory.forEach(e=>{if(e?.time){const d=new Date(e.time);if(!isNaN(d)){const ey=d.getFullYear(),em=d.getMonth()+1;[[cy,cm],[cm===1?cy-1:cy,cm===1?12:cm-1],[cm<=2?cy-1:cy,cm===1?11:(cm===2?12:cm-2)]].forEach(([ty,tm],i)=>{if(ey===ty&&em===tm)cnt[i]++;});}}});
  document.getElementById('currentMonthCount').innerText=cnt[0];document.getElementById('lastMonthCount').innerText=cnt[1];document.getElementById('twoMonthsAgoCount').innerText=cnt[2];
  updateWeeklyStats(realHistory);};
const updateHistoryUI=h=>{const ul=document.getElementById('history');if(!ul)return;ul.innerHTML='';if(!h?.length){ul.innerHTML='<li>📭 Keine Einträge</li>';return;}[...h].reverse().forEach(e=>{ul.innerHTML+=`<li>🍺 ${escapeHtml(e.name)} – ${new Date(e.time).toLocaleString('de-DE')}</li>`;});};
const loadLocalData=()=>{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):null;};
const saveLocalData=d=>localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
const refreshUI=()=>{if(useFirebase&&mainDocRef){import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js").then(({getDoc})=>{getDoc(mainDocRef).then(snap=>{if(snap.exists()){const d=snap.data(),rd={};names.forEach(n=>rd[n]=d[n]||0);renderMainTable(rd);updateHistoryUI(d.history||[]);renderMonthlyChart(d.history||[]);}});});}else{let d=loadLocalData();if(!d){const e={};names.forEach(n=>e[n]=0);d={...e,history:[]};saveLocalData(d);}names.forEach(n=>{if(typeof d[n]!=='number')d[n]=0;});if(!d.history)d.history=[];renderMainTable(d);updateHistoryUI(d.history);renderMonthlyChart(d.history);}};
const addBeerLocal=async n=>{let d=loadLocalData();if(!d){d={history:[]};names.forEach(n=>d[n]=0);}const oc=d[n]||0;d[n]=oc+1;d.history.push({name:n,time:new Date().toISOString()});saveLocalData(d);refreshUI();showToast(`🍺 ${n}: +1 Bier (neuer Stand: ${d[n]} Bier)`);};
const addBeerFirebase=async n=>{if(!mainDocRef)return;const{getDoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),snap=await getDoc(mainDocRef);let c=snap.exists()?snap.data():{};const oc=c[n]||0;c[n]=oc+1;c.history=[...(c.history||[]),{name:n,time:new Date().toISOString()}];await setDoc(mainDocRef,c);refreshUI();showToast(`🍺 ${n}: +1 Bier (neuer Stand: ${c[n]} Bier)`);};
const addBeer=n=>{if(useFirebase&&mainDocRef)addBeerFirebase(n);else addBeerLocal(n);};
const resetAll=async()=>{if(!isAdminLoggedIn){alert("Keine Berechtigung!");return;}if(useFirebase&&mainDocRef){const{getDoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),snap=await getDoc(mainDocRef);if(snap.exists()){let c=snap.data();names.forEach(n=>c[n]=0);await setDoc(mainDocRef,c);}}else{let d=loadLocalData();if(d){names.forEach(n=>d[n]=0);saveLocalData(d);}}refreshUI();alert("✅ Alle Biere zurückgesetzt");};
const clearHistory=async()=>{if(!isAdminLoggedIn){alert("Keine Berechtigung!");return;}if(useFirebase&&mainDocRef){const{getDoc,setDoc}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),snap=await getDoc(mainDocRef);if(snap.exists()){let c=snap.data();c.history=[];await setDoc(mainDocRef,c);}}else{let d=loadLocalData();if(d){d.history=[];saveLocalData(d);}}refreshUI();alert("✅ Verlauf gelöscht");};
const initFirebase=async()=>{updateConnectionStatus('📡 Verbinde mit Firebase...');try{const{initializeApp}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"),{getFirestore,doc,getDoc,onSnapshot}=await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"),app=initializeApp(FIREBASE_CONFIG),db=getFirestore(app);mainDocRef=doc(db,"strichliste","juii_main");const snap=await getDoc(mainDocRef);if(!snap.exists()){const ed={history:[]};names.forEach(n=>ed[n]=0);renderMainTable(ed);updateHistoryUI([]);renderMonthlyChart([]);}else{const d=snap.data(),rd={};names.forEach(n=>rd[n]=d[n]||0);renderMainTable(rd);updateHistoryUI(d.history||[]);renderMonthlyChart(d.history||[]);}updateConnectionStatus('✅ Firebase verbunden');useFirebase=true;unsubscribe=onSnapshot(mainDocRef,s=>{if(s.exists()){const sd=s.data(),nd={};names.forEach(n=>nd[n]=typeof sd[n]==='number'?sd[n]:0);renderMainTable(nd);updateHistoryUI(sd.history||[]);renderMonthlyChart(sd.history||[]);}});return true;}catch(err){updateConnectionStatus('⚠️ Lokaler Modus');refreshUI();useFirebase=false;return false;}};
const loginAdmin=()=>{const pwd=document.getElementById('adminPassword').value;if(pwd===ADMIN_PASSWORD){isAdminLoggedIn=true;sessionStorage.setItem('adminAuth','true');document.getElementById('adminActions').style.display='block';showToast("✅ Login erfolgreich!");refreshUI();}else{showToast("❌ Falsches Passwort!",true);}};
const logoutAdmin=()=>{isAdminLoggedIn=false;sessionStorage.removeItem('adminAuth');document.getElementById('adminActions').style.display='none';refreshUI();showToast("👋 Logout");};
const checkAdminSession=()=>{if(sessionStorage.getItem('adminAuth')==='true'){isAdminLoggedIn=true;document.getElementById('adminActions').style.display='block';}refreshUI();};
const handleUrlParam=()=>{const p=new URLSearchParams(window.location.search),add=p.get('add');if(add&&names.includes(add))setTimeout(()=>addBeer(add),800);window.history.replaceState({},"",window.location.pathname);};
const start=async()=>{checkAdminSession();await initFirebase();handleUrlParam();document.getElementById('loginBtn').onclick=loginAdmin;document.getElementById('logoutBtn').onclick=logoutAdmin;document.getElementById('resetAllBtn').onclick=resetAll;document.getElementById('clearHistoryBtn').onclick=clearHistory;document.getElementById('confirmYesBtn').onclick=()=>{if(pendingPayPerson)resetBeerCountForPerson(pendingPayPerson);};document.getElementById('confirmNoBtn').onclick=closeConfirmPopup;};
start();
</script>
</body>
</html>
