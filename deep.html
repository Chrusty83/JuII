<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JUII Bierdeckel – Strichliste mit QR & Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; }
    body {
      background: #111;
      color: #f0f0f0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px 12px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #f9b43a, #ffd966);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    h2, h3 { margin: 1rem 0 0.75rem; color: #ffd966; }
    .glass-card {
      background: rgba(30,30,40,0.85);
      backdrop-filter: blur(2px);
      border-radius: 28px;
      padding: 16px 12px;
      margin: 20px 0;
      border: 1px solid #2c2c3a;
    }
    table {
      margin: 16px auto;
      border-collapse: collapse;
      width: 100%;
      max-width: 1300px;
      background: #1e1e2a;
      border-radius: 24px;
      overflow: hidden;
    }
    th, td {
      border-bottom: 1px solid #2e2e3e;
      padding: 12px 8px;
      font-size: 14px;
      vertical-align: middle;
    }
    th { background: #252536; color: #ffda88; }
    .beer-icons { font-size: 1.4rem; letter-spacing: 2px; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 60px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      margin: 4px 6px;
    }
    .add { background: #0a84ff; color: white; }
    .pay { background: #00c853; color: white; }
    .cancel { background: #6c757d; color: white; }
    .qr-grid canvas {
      background: white;
      border-radius: 12px;
      padding: 6px;
      width: 100px !important;
      height: 100px !important;
    }
    #chartContainer {
      background: #1a1a28;
      border-radius: 28px;
      padding: 16px;
      margin: 28px 0;
    }
    canvas#beerChart { max-height: 320px; width: 100% !important; }
    input[type="password"] {
      background: #2a2a36;
      border: 1px solid #444;
      padding: 10px 14px;
      border-radius: 48px;
      color: white;
      font-size: 1rem;
      width: 220px;
    }
    #popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #popupBox {
      background: #1f1f2c;
      padding: 28px 24px;
      border-radius: 48px;
      min-width: 260px;
      border: 1px solid #ffd966;
    }
    #popupSum { font-size: 1.8rem; font-weight: bold; color: #b9f6ca; }
    .history-list {
      background: #0f0f17;
      border-radius: 28px;
      padding: 12px 18px;
      max-height: 240px;
      overflow-y: auto;
      text-align: left;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .status-badge.online { background: #4caf50; color: #000; }
    .status-badge.offline { background: #f44336; color: #fff; }
    .status-badge.error { background: #f44336; color: #fff; }
    .status-badge.local { background: #2196f3; color: #fff; }
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #ffd966;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
    }
    .debug-info {
      background: #1a1a2a;
      border-radius: 12px;
      padding: 12px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 11px;
      text-align: left;
      word-break: break-all;
    }
    footer { font-size: 12px; margin-top: 30px; opacity: 0.6; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<h1>🍺 JUII BIERDECKEL 🍺</h1>
<div id="syncStatus" style="margin-bottom: 10px;"></div>

<div class="glass-card">
  <h2>📋 Offene Biere</h2>
  <div style="overflow-x: auto;">
    <table>
      <thead><tr><th>Name</th><th>🍺 Anzahl / Betrag</th><th>Aktionen</th></tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="3" style="text-align:center;">📡 Lade Daten aus Firebase... <span class="loading-spinner"></span></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="chartContainer">
  <h2>📈 Bierkonsum pro Monat</h2>
  <canvas id="beerChart" width="800" height="350"></canvas>
</div>

<div class="glass-card qr-grid">
  <h2>📱 QR-Codes</h2>
  <div style="overflow-x: auto;">
    <table>
      <tbody id="qrBody"></tbody>
    </table>
  </div>
</div>

<div class="glass-card">
  <h2>🔐 Admin Bereich</h2>
  <div>
    <input type="password" id="adminPassword" placeholder="Admin Passwort">
    <button onclick="loginWithHash()" class="add">🔓 Login</button>
  </div>
  <div id="adminActions" style="display:none; margin-top: 20px;">
    <button id="resetAllBtn" style="background:#c44536;">🧹 Alle Biere zurücksetzen</button>
    <button id="clearHistoryBtn" style="background:#e68a2e;">🗑️ Verlauf löschen</button>
    <button onclick="logoutAdmin()" style="background:#666;">🚪 Logout</button>
    <h3>📜 Letzte Aktionen</h3>
    <div class="history-list"><ul id="history"></ul></div>
  </div>
  <div id="debugInfo" class="debug-info"></div>
</div>

<div id="popup">
  <div id="popupBox">
    <h3 id="popupName"></h3>
    <p>offene Rechnung:</p>
    <p id="popupSum"></p>
    <button class="pay" id="confirmPayBtn">✅ Zahlen & löschen</button>
    <button class="cancel" id="closePopupBtn">❌ Abbrechen</button>
  </div>
</div>

<script>
  // ==================== FIREBASE KONFIGURATION ====================
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAzj8jF78WhPkSJlqs6Yysfoeog1WQBmRw",
  authDomain: "juii-strichliste.firebaseapp.com",
  projectId: "juii-strichliste",
  storageBucket: "juii-strichliste.firebasestorage.app",
  messagingSenderId: "8081599971",
  appId: "1:8081599971:web:6cc277281b040d995304d6",
  measurementId: "G-2NNFYKSX3L"
  };
  
  // ==================== ADMIN PASSWORT ====================
  // Passwort: admin123
  // SHA-256 Hash: "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b"
  const ADMIN_PASSWORD_HASH = "6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b";
  
  // Falls Sie ein anderes Passwort möchten:
  // 1. Besuchen Sie: https://emn178.github.io/online-tools/sha256.html
  // 2. Geben Sie Ihr Wunschpasswort ein (z.B. "MeinSicheresPasswort")
  // 3. Kopieren Sie den generierten Hash (64 Zeichen)
  // 4. Ersetzen Sie den ADMIN_PASSWORD_HASH oben
  
  let isAdminLoggedIn = false;
  let useFirebase = false;
  let mainDocRef = null;
  let unsubscribe = null;
  let beerChart = null;
  let currentPayPerson = null;
  
  const names = ["Andi","Basti G.","Benny","Bernd G.","Bernd K.","Chris","Clemens","Dietmar","Donde","Jakob","Lukas","Max","Micha","Hainzl","Philipp","Basti B.","Simon","Schwob","Tim","Timo","Tom"];
  const BEER_PRICE = 2.00;
  const STORAGE_KEY = "juii_bierdeckel_data";
  
  // ==================== HILFSFUNKTIONEN ====================
  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }
  
  function formatEuro(amount) {
    if (amount === Math.floor(amount)) {
      return `${Math.floor(amount)} €`;
    } else {
      return `${amount.toFixed(2)} €`;
    }
  }
  
  function updateDebugInfo(message, isError = false) {
    const debugDiv = document.getElementById('debugInfo');
    if (debugDiv) {
      const time = new Date().toLocaleTimeString();
      debugDiv.innerHTML = `<strong>📡 Debug (${time}):</strong><br>${message}` + (isError ? '<br><span style="color:#ff8888;">⚠️ Bitte prüfen</span>' : '');
    }
  }
  
  function updateSyncStatus(status, message) {
    const statusDiv = document.getElementById('syncStatus');
    if (statusDiv) {
      statusDiv.innerHTML = `<span class="status-badge ${status}">${message}</span>`;
    }
  }
  
  // ==================== UI RENDER ====================
  function renderMainTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!data) { tbody.innerHTML = '<tr><td colspan="3">📭 Keine Daten</td></tr>'; return; }
    for (let name of names) {
      const count = data[name] || 0;
      const total = count * BEER_PRICE;
      const formattedTotal = formatEuro(total);
      let icons = count > 0 ? "🍺".repeat(Math.min(count, 20)) + (count > 20 ? ` +${count-20}` : "") : "—";
      tbody.innerHTML += `
        <tr>
          <td style="font-weight:500;">${escapeHtml(name)}</td>
          <td class="beer-icons">${icons}<br>💰 ${formattedTotal}</td>
          <td>
            <button class="add" data-name="${escapeHtml(name)}">➕ +1</button>
            <button class="pay" data-name-pay="${escapeHtml(name)}">💶 Zahlen</button>
          </td>
        </tr>
      `;
    }
    document.querySelectorAll('.add').forEach(btn => { btn.onclick = () => addBeer(btn.dataset.name); });
    document.querySelectorAll('.pay').forEach(btn => { btn.onclick = () => openPayPopup(btn.dataset.namePay); });
  }
  
  function renderMonthlyChart(historyArray) {
    const months = new Map();
    (historyArray || []).forEach(e => {
      if (e?.time) { const d = new Date(e.time); if (!isNaN(d)) months.set(`${d.getMonth()+1}/${d.getFullYear()}`, (months.get(`${d.getMonth()+1}/${d.getFullYear()}`) || 0) + 1); }
    });
    const ctx = document.getElementById('beerChart').getContext('2d');
    if (beerChart) beerChart.destroy();
    beerChart = new Chart(ctx, { 
      type: 'bar', 
      data: { 
        labels: Array.from(months.keys()), 
        datasets: [{ label: '🍺 Biere/Monat', data: Array.from(months.values()), backgroundColor: '#f9b43a', borderRadius: 12 }] 
      }, 
      options: { 
        responsive: true, 
        plugins: { legend: { labels: { color: '#fff' } } }, 
        scales: { y: { ticks: { color: '#ddd' } }, x: { ticks: { color: '#ffd966' } } } 
      } 
    });
  }
  
  function updateHistoryUI(historyArray) {
    const ul = document.getElementById('history');
    if (!ul) return;
    ul.innerHTML = '';
    if (!historyArray?.length) { ul.innerHTML = '<li>📭 Keine Einträge</li>'; return; }
    [...historyArray].reverse().forEach(e => { ul.innerHTML += `<li>🍺 ${e.name} – ${new Date(e.time).toLocaleString('de-DE')}</li>`; });
  }
  
  function renderQRTable() {
    const qrBody = document.getElementById('qrBody');
    if (!qrBody) return;
    qrBody.innerHTML = '';
    const baseUrl = window.location.origin + window.location.pathname;
    names.forEach(name => {
      const id = `qr-${name.replace(/[^a-zA-Z0-9]/g, "_")}`;
      qrBody.innerHTML += `<tr><td style="font-weight:bold;">${escapeHtml(name)}</td><td><canvas id="${id}" width="120" height="120"></canvas></td></tr>`;
    });
    setTimeout(() => {
      names.forEach(name => {
        const canvas = document.getElementById(`qr-${name.replace(/[^a-zA-Z0-9]/g, "_")}`);
        if (canvas) QRCode.toCanvas(canvas, `${baseUrl}?add=${encodeURIComponent(name)}`, { width: 110 });
      });
    }, 100);
  }
  
  // ==================== LOCALSTORAGE FALLBACK ====================
  function loadLocalData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : null;
  }
  
  function saveLocalData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  
  function renderLocalData() {
    let data = loadLocalData();
    if (!data) { const empty = {}; names.forEach(n => empty[n] = 0); data = { ...empty, history: [] }; saveLocalData(data); }
    names.forEach(n => { if (typeof data[n] !== 'number') data[n] = 0; });
    if (!data.history) data.history = [];
    renderMainTable(data);
    updateHistoryUI(data.history);
    renderMonthlyChart(data.history);
    updateSyncStatus('local', '💾 Lokaler Modus – Daten im Browser gespeichert');
  }
  
  async function addBeerLocal(name) {
    let data = loadLocalData() || (() => { const d = {}; names.forEach(n => d[n] = 0); d.history = []; return d; })();
    data[name] = (data[name] || 0) + 1;
    data.history.push({ name, time: new Date().toISOString() });
    saveLocalData(data);
    renderLocalData();
  }
  
  async function payLocal(person) {
    if (!person) return;
    let data = loadLocalData();
    if (data) { data[person] = 0; saveLocalData(data); renderLocalData(); }
  }
  
  async function resetLocal() {
    if (!isAdminLoggedIn) { alert("Keine Admin-Rechte"); return false; }
    let data = loadLocalData();
    if (data) { names.forEach(n => data[n] = 0); saveLocalData(data); renderLocalData(); alert("✅ Alle Biere zurückgesetzt"); return true; }
    return false;
  }
  
  async function clearHistoryLocal() {
    if (!isAdminLoggedIn) { alert("Keine Admin-Rechte"); return false; }
    let data = loadLocalData();
    if (data) { data.history = []; saveLocalData(data); renderLocalData(); alert("✅ Verlauf gelöscht"); return true; }
    return false;
  }
  
  // ==================== FIREBASE OPERATIONEN ====================
  async function addBeerFirebase(name) {
    if (!mainDocRef) return;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    let current = snap.exists() ? snap.data() : {};
    current[name] = (current[name] || 0) + 1;
    current.history = [...(current.history || []), { name, time: new Date().toISOString() }];
    await setDoc(mainDocRef, current);
  }
  
  async function payFirebase(person) {
    if (!person || !mainDocRef) return;
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      current[person] = 0;
      await setDoc(mainDocRef, current);
    }
  }
  
  async function resetFirebase() {
    if (!isAdminLoggedIn || !mainDocRef) { alert("Keine Admin-Rechte"); return false; }
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      names.forEach(n => current[n] = 0);
      await setDoc(mainDocRef, current);
      alert("✅ Alle Biere zurückgesetzt");
      return true;
    }
    return false;
  }
  
  async function clearHistoryFirebase() {
    if (!isAdminLoggedIn || !mainDocRef) { alert("Keine Admin-Rechte"); return false; }
    const { getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const snap = await getDoc(mainDocRef);
    if (snap.exists()) {
      let current = snap.data();
      current.history = [];
      await setDoc(mainDocRef, current);
      alert("✅ Verlauf gelöscht");
      return true;
    }
    return false;
  }
  
  // ==================== FIREBASE INIT ====================
  async function initFirebase() {
    updateSyncStatus('offline', '📡 Verbinde mit Firebase...');
    
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.length < 20) {
      updateSyncStatus('offline', '⚠️ Firebase nicht konfiguriert – Verwende localStorage');
      renderLocalData();
      useFirebase = false;
      return false;
    }
    
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
      const { getFirestore, doc, getDoc, onSnapshot } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
      
      const app = initializeApp(FIREBASE_CONFIG);
      const db = getFirestore(app);
      mainDocRef = doc(db, "strichliste", "juii_main");
      
      const testSnap = await getDoc(mainDocRef);
      
      if (!testSnap.exists()) {
        const emptyData = { history: [] };
        names.forEach(n => emptyData[n] = 0);
        renderMainTable(emptyData);
        updateHistoryUI([]);
        renderMonthlyChart([]);
      } else {
        const data = testSnap.data();
        const renderData = {};
        names.forEach(n => renderData[n] = data[n] || 0);
        renderMainTable(renderData);
        updateHistoryUI(data.history || []);
        renderMonthlyChart(data.history || []);
      }
      
      updateSyncStatus('online', '✅ Firebase verbunden – Live-Synchronisation');
      useFirebase = true;
      
      unsubscribe = onSnapshot(mainDocRef, (snapshot) => {
        if (snapshot.exists()) {
          const snapData = snapshot.data();
          const newData = {};
          names.forEach(n => newData[n] = typeof snapData[n] === 'number' ? snapData[n] : 0);
          renderMainTable(newData);
          updateHistoryUI(snapData.history || []);
          renderMonthlyChart(snapData.history || []);
        }
      });
      
      return true;
    } catch (err) {
      console.error("Firebase Init Fehler:", err);
      updateSyncStatus('error', '⚠️ Firebase Fehler – Verwende localStorage');
      renderLocalData();
      useFirebase = false;
      return false;
    }
  }
  
  // ==================== DISPATCHER ====================
  async function addBeer(name) {
    if (useFirebase && mainDocRef) await addBeerFirebase(name);
    else await addBeerLocal(name);
  }
  
  async function pay(person) {
    if (useFirebase && mainDocRef) await payFirebase(person);
    else await payLocal(person);
  }
  
  // ==================== POPUP ====================
  async function openPayPopup(name) {
    currentPayPerson = name;
    let count = 0;
    if (useFirebase && mainDocRef) {
      try {
        const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        const snap = await getDoc(mainDocRef);
        count = snap.exists() ? (snap.data()[name] || 0) : 0;
      } catch(e) { count = 0; }
    } else {
      const data = loadLocalData();
      count = data ? (data[name] || 0) : 0;
    }
    const total = count * BEER_PRICE;
    const formattedTotal = formatEuro(total);
    document.getElementById('popupName').innerText = name;
    document.getElementById('popupSum').innerHTML = `${count} 🍺 = <strong>${formattedTotal}</strong>`;
    document.getElementById('popup').style.display = 'flex';
  }
  
  async function onConfirmPayment() {
    if (currentPayPerson) await pay(currentPayPerson);
    document.getElementById('popup').style.display = 'none';
    currentPayPerson = null;
  }
  
  // ==================== ADMIN LOGIN ====================
  async function hashPassword(pwd) {
    const enc = new TextEncoder();
    const hash = await crypto.subtle.digest('SHA-256', enc.encode(pwd));
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  
  window.loginWithHash = async function() {
    const pwd = document.getElementById('adminPassword').value;
    if (!pwd) { alert("Bitte Passwort eingeben"); return; }
    const hash = await hashPassword(pwd);
    
    // Debug-Ausgabe in Konsole
    console.log("Eingegebenes Passwort:", pwd);
    console.log("Generierter Hash:", hash);
    console.log("Erwarteter Hash:", ADMIN_PASSWORD_HASH);
    
    if (hash === ADMIN_PASSWORD_HASH) {
      isAdminLoggedIn = true;
      sessionStorage.setItem('adminAuth', 'true');
      document.getElementById('adminActions').style.display = 'block';
      document.getElementById('adminPassword').value = '';
      alert("✅ Login erfolgreich!");
      updateDebugInfo(`Admin-Login erfolgreich um ${new Date().toLocaleTimeString()}`);
    } else { 
      alert("❌ Falsches Passwort!\n\nVerwenden Sie: admin123");
      updateDebugInfo(`❌ Login fehlgeschlagen. Falsches Passwort.`, true);
    }
  };
  
  window.logoutAdmin = function() {
    isAdminLoggedIn = false;
    sessionStorage.removeItem('adminAuth');
    document.getElementById('adminActions').style.display = 'none';
    alert("👋 Admin-Logout");
  };
  
  function checkAdminSession() {
    if (sessionStorage.getItem('adminAuth') === 'true') {
      isAdminLoggedIn = true;
      document.getElementById('adminActions').style.display = 'block';
    }
  }
  
  // ==================== INIT ====================
  function handleUrlParam() {
    const params = new URLSearchParams(window.location.search);
    const add = params.get('add');
    if (add && names.includes(add)) {
      setTimeout(() => addBeer(add), 800);
      window.history.replaceState({}, "", window.location.pathname);
    }
  }
  
  async function start() {
    checkAdminSession();
    renderQRTable();
    await initFirebase();
    handleUrlParam();
    
    document.getElementById('confirmPayBtn')?.addEventListener('click', (e) => { e.preventDefault(); onConfirmPayment(); });
    document.getElementById('closePopupBtn')?.addEventListener('click', (e) => { e.preventDefault(); document.getElementById('popup').style.display = 'none'; currentPayPerson = null; });
    document.getElementById('resetAllBtn')?.addEventListener('click', async () => { if (useFirebase) await resetFirebase(); else await resetLocal(); });
    document.getElementById('clearHistoryBtn')?.addEventListener('click', async () => { if (useFirebase) await clearHistoryFirebase(); else await clearHistoryLocal(); });
  }
  
  start();
</script>
</body>
</html>
